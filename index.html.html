<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Logístico</title>
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --thead:#fafbfc; --border:#e1e4e8; --row-border:#eef0f2;
  --row-alt:#eef2f7; --row-linha:#d4dae2; --hover-row:#fff4cc; --text:#201f1e; --sub:#6b6f76; --accent:#0f6cbd; --accent-soft:rgba(15,108,189,.09);
  --sidebar:#ffffff; --shadow:0 1px 2px rgba(0,0,0,.06);
  --verde:#107c10; --verde-bg:rgba(16,124,16,.12);
  --amarelo:#a68b00; --amarelo-bg:rgba(234,179,8,.15);
  --laranja:#c2570b; --laranja-bg:rgba(234,88,12,.14);
  --vermelho:#c50f1f; --vermelho-bg:rgba(197,15,31,.12);
}
[data-theme=dark]{
  --bg:#1b1a19; --card:#252423; --thead:#2b2a29; --border:#3b3a39; --row-border:#323130;
  --row-alt:#33322f; --row-linha:#4a4844; --hover-row:#4d4a2f; --text:#f3f2f1; --sub:#a19f9d; --accent:#4ea1e0; --accent-soft:rgba(78,161,224,.15);
  --sidebar:#201f1e; --shadow:0 1px 2px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
button{font-family:inherit}
h2{font-size:18px;margin:0 0 14px}
.hidden{display:none!important}

/* ---------- Login ---------- */
#telaLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f6cbd 0%,#123a63 100%)}
.login-card{background:#fff;border-radius:14px;padding:34px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35);color:#201f1e}
.login-card .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.login-card .sub{font-size:12.5px;color:#6b6f76;margin:4px 0 22px}
.login-card label{font-size:12px;color:#6b6f76;display:block;margin-bottom:5px}
.login-card input[type=text],.login-card input[type=password]{width:100%;padding:9px 11px;border-radius:7px;border:1px solid #d5d9de;font-size:13px;margin-bottom:14px}
.login-card .lembrar{display:flex;gap:7px;align-items:center;font-size:12.5px;color:#444;margin-bottom:16px}
.login-card .entrar{width:100%;background:#0f6cbd;color:#fff;border:none;border-radius:8px;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer}
.login-card .entrar:hover{background:#0d5ea6}
.login-card .esqueci{display:block;text-align:center;margin-top:12px;font-size:12.5px;color:#0f6cbd;text-decoration:none}
.auth-abas{display:flex;gap:6px;margin-bottom:18px;background:#eef1f5;border-radius:9px;padding:4px}
.auth-aba{flex:1;border:none;background:transparent;padding:8px 0;border-radius:7px;font-size:13px;font-weight:600;color:#6b6f76;cursor:pointer}
.auth-aba.ativa{background:#fff;color:#0f6cbd;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:8px;padding:9px 0;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px}
.google-btn:hover{background:#f7f8fa}
.aviso-reg{font-size:12px;color:#6b6f76;background:#eef4fb;border:1px solid #d6e6f7;border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.5}
/* gestão de acessos */
.tag-status{font-weight:600;font-size:11px;padding:2px 9px;border-radius:10px;display:inline-block}
.acesso-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);cursor:pointer;user-select:none;background:var(--card);color:var(--sub)}
.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
/* ===== navegação superior moderna (categorias + dropdowns) ===== */
.topnav{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--shadow)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;border:none;background:transparent;color:var(--text);font-size:13px;font-weight:600;padding:9px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.nav-btn:hover{background:var(--accent-soft);color:var(--accent)}
.nav-btn.ativa{background:var(--accent);color:#fff}
.nav-btn.ativa:hover{background:var(--accent);color:#fff}
.nav-ic{flex-shrink:0}
.chev{transition:transform .2s ease}
.nav-drop{position:relative}
.nav-drop:hover .chev,.nav-drop.aberto .chev{transform:rotate(180deg)}
.nav-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:230px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 12px 32px rgba(0,0,0,.16);display:flex;flex-direction:column;gap:4px;z-index:45;
  opacity:0;visibility:hidden;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease,visibility .18s}
.nav-drop:hover>.nav-menu,.nav-drop.aberto>.nav-menu{opacity:1;visibility:visible;transform:translateY(0)}
.nav-menu-item{text-align:left;border:none;background:transparent;color:var(--text);font-size:13px;font-weight:500;padding:10px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .13s,color .13s}
.nav-menu-item:hover{background:var(--accent-soft);color:var(--accent)}
.nav-menu-item.ativa{background:var(--accent);color:#fff;font-weight:600}
.nav-menu-item.ativa:hover{background:var(--accent);color:#fff}
.tabs-prev{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tab-prev{border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;font-weight:600;padding:6px 11px;border-radius:16px;cursor:pointer;white-space:nowrap}
.tab-prev:hover{border-color:var(--accent);color:var(--accent)}
.tab-prev.ativa{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.dropzone{text-align:center;padding:38px 18px;border:2px dashed var(--border);cursor:pointer;max-width:560px}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;max-width:1080px}
.dz-mini{max-width:none;padding:22px 14px}
.up-meta{font-size:11px;color:var(--text);margin-top:10px;line-height:1.5;border-top:1px dashed var(--border);padding-top:8px}
.up-meta.vazio{color:var(--sub)}
.dropzone:hover{border-color:var(--accent);color:var(--accent)}
/* toggle Reduzido/Total */
.toggle-red{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);user-select:none}
.toggle-red .tg-on{color:var(--accent)}
.tg-track{width:34px;height:18px;border-radius:10px;background:var(--accent);position:relative;flex-shrink:0}
.tg-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .18s ease}
.tg-knob.dir{left:18px}

/* ---------- Layout ---------- */
#app{min-height:100vh}
.brand-top{display:flex;align-items:center;gap:11px;margin-right:6px}
.logo-mor{height:34px;display:block}
.brand-sub{color:#fff;font-size:15.5px;font-weight:700;line-height:1.1;border-left:1px solid rgba(255,255,255,.4);padding-left:11px}
.brand-sub small{display:block;font-size:12px;font-weight:500;color:#d6e8f8;margin-top:1px}
/* cabeçalho azul nos dois temas → elementos claros sempre */
header .atualiz-info{color:rgba(255,255,255,.85)}
header .brand-top span{color:#fff}
header .atualiz-info b{color:#fff}
header .atualiz-info .pub{color:#cfe4f7}
header .icone-btn{color:#fff}
header .icone-btn:hover{background:rgba(255,255,255,.15)}
header .tema-btn{border-color:rgba(255,255,255,.45)}
header .online-chip{border-color:rgba(255,255,255,.45);color:#fff}
header .online-chip:hover{border-color:#fff;color:#fff}
header .btn{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.45);color:#fff}
header .btn:hover{background:rgba(255,255,255,.25);color:#fff}
/* menus que descem do header voltam ao fundo/cor normais */
header .notif-menu,header .user-menu{color:var(--text)}
header .notif-menu .btn,header .user-menu .btn{background:var(--accent);border-color:var(--accent);color:#fff}
header .notif-menu .btn:hover,header .user-menu .btn:hover{background:var(--accent-hover,#0d5aa0);color:#fff}
.atualiz-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.atualiz-info{font-size:11.5px;color:var(--sub);line-height:1.35}
.atualiz-info b{color:var(--text);font-weight:600}
.atualiz-info .pub{color:var(--accent)}
/* indicador discreto de usuários online */
.online-chip{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:14px;padding:4px 10px;cursor:pointer;color:var(--sub);font-size:12px;font-weight:600}
.online-chip:hover{border-color:var(--accent);color:var(--accent)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.online-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--row-border)}
.online-item .online-dot{box-shadow:none}
.online-item .quando{margin-left:auto;color:var(--sub);font-size:11px}
main{min-width:0}
header{display:flex;align-items:center;gap:14px;padding:12px 26px;background:var(--accent);border-bottom:1px solid var(--accent);position:sticky;top:0;z-index:40;flex-wrap:wrap}
.conteudo{padding:22px}
.sub-texto{color:var(--sub);font-size:12.5px;margin:-6px 0 14px}

/* ---------- Controles ---------- */
.input,select.input{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12.5px;outline:none}
.input:focus{border-color:var(--accent)}
.busca-wrap{position:relative;flex:0 0 150px}
.busca-wrap svg{position:absolute;left:10px;top:9px;color:var(--sub)}
.busca-wrap input{padding-left:32px;width:100%;background:var(--bg)}
.btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primario{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primario:hover{filter:brightness(.93);color:#fff}
.btn.pequeno{padding:5px 10px}
.icone-btn{background:none;border:none;cursor:pointer;color:var(--text);padding:6px;position:relative;border-radius:8px}
.icone-btn:hover{background:var(--accent-soft)}
.tema-btn{border:1px solid var(--border)}

/* ---------- Cards ---------- */
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.card{text-align:left;cursor:pointer;border:1px solid var(--border);background:var(--card);border-radius:10px;padding:8px 14px;min-width:108px;flex:0 1 auto;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
.card:hover{border-color:var(--accent)}
.card.ativo{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card .rotulo{font-size:11.5px;color:var(--sub);margin-bottom:2px;white-space:nowrap}
.card .valor{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- Grid ---------- */
.grid-barra{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.grid-barra .espaco{flex:1}
/* altura p/ ~15 linhas: cabeçalho + 15 linhas */
.tabela-wrap{overflow:auto;max-height:698px;border:1px solid var(--border);border-radius:10px;background:var(--card)}
:root{--header-h:62px}
table{border-collapse:separate;border-spacing:0;width:100%}
th{position:sticky;top:0;z-index:2;background:var(--accent);color:#fff;font-size:11.5px;font-weight:600;text-align:center;padding:6px 12px;border-bottom:1px solid var(--accent);cursor:pointer;white-space:nowrap;user-select:none}
th.fixa{z-index:3;background:var(--accent);box-sizing:border-box}
/* larguras das colunas congeladas agora são aplicadas inline (por chave) em renderGrid */
td.fixa{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-sizing:border-box}
th .seta{color:#fff;margin-left:4px}
td{padding:0px 12px;border-bottom:1px solid var(--row-border);font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums;line-height:1.05;text-align:center}
td.fixa{position:sticky;background:var(--card);z-index:1}
tbody tr{border-bottom:1px solid var(--row-linha)}
tbody tr td{border-bottom:1px solid var(--row-linha)}
/* linha vertical entre colunas (sutil, só nas tabelas de dados) */
.tabela-wrap td{border-right:1px solid var(--row-border)}
.tabela-wrap th{border-right:1px solid rgba(255,255,255,.10)}
/* borda de 2px marcando o fim do bloco de colunas congeladas */
.tabela-wrap td.fixa-borda,.tabela-wrap th.fixa-borda{border-right:2px solid var(--border)}
.tabela-wrap tbody tr.sel td.fixa-borda{border-right-color:var(--accent)}
tbody tr:nth-child(even){background:var(--row-alt)}
tbody tr:nth-child(even) td.fixa{background:var(--row-alt)}
tbody tr:hover td{background:var(--hover-row)}
tbody tr:hover td.fixa{background:var(--hover-row)}
.nf-link{color:var(--accent);font-weight:600;cursor:pointer}
.vazio{color:var(--sub)}
.paginacao{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12.5px;color:var(--sub)}
.paginacao .espaco{flex:1}
/* cabeçalho clicável + funil */
th{cursor:pointer}
th{text-align:center}
th > *{vertical-align:middle}
th .th-lbl{margin-right:2px}
th .seta{color:#fff;font-size:9px;margin:0 2px}
th .col-funil{color:#fff;font-size:9px;opacity:.65}
th .col-funil.ativa{color:#ffe08a;opacity:1}
th:hover .col-funil{opacity:1}
/* popup filtro estilo Excel */
.fl-overlay{position:fixed;inset:0;z-index:55}
.fl-pop{position:fixed;z-index:56;width:270px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.22);padding:6px;display:flex;flex-direction:column;gap:2px;animation:surgir .14s ease;overflow:hidden}
.fl-opt{display:flex;align-items:center;gap:8px;text-align:left;border:none;background:transparent;color:var(--text);font-size:12.5px;padding:8px 10px;border-radius:7px;cursor:pointer;width:100%;flex-shrink:0}
.fl-opt:hover{background:var(--accent-soft);color:var(--accent)}
.fl-opt.disabled{color:var(--sub);opacity:.5;cursor:default}
.fl-opt.disabled:hover{background:transparent;color:var(--sub)}
.fl-sep{height:1px;background:var(--border);margin:3px 2px;flex-shrink:0}
.fl-busca{padding:2px 4px 4px;flex-shrink:0}
.fl-busca .input{width:100%;box-sizing:border-box}
.fl-lista{flex:1 1 auto;min-height:110px;max-height:260px;overflow-y:auto;padding:2px;overscroll-behavior:contain}
.fl-item{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 8px;border-radius:6px;cursor:pointer}
.fl-item:hover{background:var(--accent-soft)}
.fl-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl-todos{font-weight:600;border-bottom:1px solid var(--border);border-radius:0;margin:2px 2px 0;flex-shrink:0}
.fl-vazio{padding:10px;color:var(--sub);font-size:12px;text-align:center}
.fl-acoes{display:flex;gap:6px;justify-content:flex-end;padding:6px 4px 2px;border-top:1px solid var(--border);margin-top:2px;flex-shrink:0}

/* ---------- Badges ---------- */
.badge{font-weight:600;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block}
.b-verde{color:var(--verde);background:var(--verde-bg)}
.b-amarelo{color:var(--amarelo);background:var(--amarelo-bg)}
.b-laranja{color:var(--laranja);background:var(--laranja-bg)}
.b-vermelho{color:var(--vermelho);background:var(--vermelho-bg)}
.b-azul{color:var(--accent);background:var(--accent-soft)}
.legenda{display:flex;gap:14px;align-items:center;margin-bottom:10px;font-size:11.5px;color:var(--sub);flex-wrap:wrap}
/* legenda de cores das linhas */
.dm-reset{width:100%;text-align:left;border:none;background:transparent;color:var(--accent);font-weight:600;font-size:12.5px;padding:7px 8px;cursor:pointer;border-radius:6px}
.dm-reset:hover{background:var(--accent-soft)}
.dica-ajuda{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;cursor:help;user-select:none;border:1px solid var(--border)}
.dica-ajuda:hover{background:var(--accent);color:#fff}
.dica-ajuda .dica-balao{position:absolute;top:26px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:11.5px;font-weight:400;line-height:1.5;padding:8px 11px;border-radius:8px;white-space:normal;width:230px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;visibility:hidden;transition:opacity .15s;z-index:30;text-align:left}
.dica-ajuda:hover .dica-balao{opacity:1;visibility:visible}
.dica-ajuda .dica-balao::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:5px solid #222}
.titulo-legenda{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:16px 0 14px}
.legendas-retencao{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin:0 0 14px}
.legendas-retencao .legenda{margin:0}
.titulo-legenda h2{margin:0}
.titulo-legenda h3{margin:0}
.titulo-legenda .legenda-cores{margin:0;padding:0}
.legenda-cores{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--sub)}
.legenda-cores .lc-titulo{font-weight:600;color:var(--sub)}
.lc-item{display:flex;align-items:center;gap:6px}
.lc-dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.lc-dot.lc-realca{background:#eab308}
.lc-dot.lc-m3000{background:#dc2626}
.lc-dot.lc-agenda{background:#2563eb}
.lc-dot.lc-liberado{background:#22c55e}
/* coluna dedicada às bolinhas de status */
td.fixa-sinal{text-align:center;padding-left:4px;padding-right:4px}
.dots-estab{display:inline-flex;gap:3px;align-items:center;justify-content:center}
.dot-linha{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.barra-sel-slot{display:contents}
.dot-linha.dl-m3000{background:#dc2626}
.dot-linha.dl-agenda{background:#2563eb}
.dot-linha.dl-liberado{background:#22c55e}
tbody tr.linha-vazia td{padding-top:0;padding-bottom:0;font-size:11px;line-height:1.1}
/* seleção de linha */
tbody tr{cursor:pointer}
tbody tr.sel td{background:color-mix(in srgb, var(--accent) 38%, var(--card))!important;color:var(--text);font-weight:500}
tbody tr.sel td .nf-link{color:var(--accent)!important;font-weight:700}
tbody tr.sel td.fixa{background:color-mix(in srgb, var(--accent) 38%, var(--card))!important}
/* período no popup de filtro */
.fl-periodo{padding:4px 6px 6px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.fl-per-tit{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em}
.fl-periodo label{display:flex;flex-direction:column;font-size:12px;color:var(--sub);gap:3px}
.fl-periodo .input{width:100%;box-sizing:border-box}
.fl-limpar-per{align-self:flex-start;border:none;background:transparent;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:2px 0}
/* painéis do resumo (infográfico) */
.resumo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:6px}
.painel-info{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--card)}
.painel-info.azul{background:linear-gradient(180deg,rgba(15,108,189,.06),transparent 60%)}
.painel-info.verde{background:linear-gradient(180deg,rgba(34,197,94,.07),transparent 60%)}
.pi-tit{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;margin-bottom:10px}
.pi-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.pi-dot.azul{background:var(--accent)}
.pi-dot.verde{background:#22c55e}
.tbl-info{width:100%;border-collapse:collapse}
.tbl-info th{position:sticky;top:0;background:var(--card)!important;color:var(--sub)!important;border-bottom:1px solid var(--border);font-size:11.5px;padding:6px 8px;cursor:default}
.tbl-info td{padding:7px 8px;border-bottom:1px solid var(--row-border);font-size:12.5px;text-align:left}
.tbl-info th{text-align:left}
.tbl-info td.num,.tbl-info th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl-info tr.total td{font-weight:700;border-top:2px solid var(--border);border-bottom:none}
.tbl-scroll{max-height:352px;overflow-y:auto;overscroll-behavior:contain;border-radius:6px}
.tbl-scroll .tbl-info th{position:sticky;top:0;background:var(--card);z-index:1}
.tbl-scroll::-webkit-scrollbar{width:8px}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
.tbl-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.tbl-info tr.filtro-row td{padding:4px 8px 8px}
.tbl-info tr.filtro-row .input{padding:4px 8px;font-size:12px;width:100%;box-sizing:border-box}
.tbl-info tbody tr{cursor:default}
.tbl-info tbody tr.clicavel{cursor:pointer}
.tbl-info tbody tr:hover td{background:var(--accent-soft)}
.tbl-info tbody tr.ativa td{background:var(--accent);color:#fff;font-weight:600}
@media(max-width:1180px){.resumo-grid{grid-template-columns:1fr 1fr}}
@media(max-width:820px){.resumo-grid{grid-template-columns:1fr}}
/* células editáveis */
.cel-edit{padding:4px 7px;font-size:12px;min-width:120px}
.cel-edit.obs{min-width:190px}
tbody tr.sel .cel-edit{background:#fff;color:#111}
/* filtros do resumo */
.resumo-filtros{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin:2px 0 16px}
.resumo-filtros label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);font-weight:600}
.resumo-filtros select{min-width:170px}
.busca-nota{display:flex;flex-direction:column;gap:4px;justify-content:center;margin-left:8px}
.busca-nota label{font-size:11.5px;color:var(--sub);font-weight:600}
.busca-nota .input{width:260px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.config-grid .painel{margin:0}
@media(max-width:900px){.config-grid{grid-template-columns:1fr}}
.tbl-info th.ordenavel{cursor:pointer;user-select:none}
.tbl-info th.ordenavel:hover{color:var(--accent)}
.rf-seta{color:var(--accent);font-size:10px;margin-left:2px}
.rf-seta.neutra{color:var(--sub);opacity:.6}
/* infográfico de barras */
.ig{display:flex;flex-direction:column;gap:7px}
.ig-row{display:flex;align-items:center;gap:10px}
.ig-nome{width:150px;font-size:12.5px;text-align:right;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ig-track{flex:1;background:var(--accent-soft);border-radius:6px;height:18px;overflow:hidden}
.ig-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease}
.ig-val{width:48px;font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- Dropdowns ---------- */
.drop{position:relative}
.drop-menu{position:absolute;right:0;top:34px;z-index:20;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:260px;overflow:auto;width:210px}
.drop-menu label{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:5px 6px;cursor:pointer;border-radius:5px}
.drop-menu label:hover{background:var(--accent-soft)}
.notif-menu{position:absolute;right:0;top:38px;width:300px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:50;overflow:hidden}
.notif-menu .titulo{padding:10px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border)}
.notif-item{padding:10px 14px;font-size:12.5px;border-bottom:1px solid var(--row-border)}
.notif-item .quando{color:var(--sub);font-size:11px;margin-top:2px}
.notif-item.notif-click{cursor:pointer}
.notif-item.notif-click:hover{background:var(--accent-soft)}
.linha-destaque{animation:destaqueFlash 2s ease}
@keyframes destaqueFlash{0%,60%{background:rgba(234,179,8,.35)}100%{background:transparent}}
.notif-badge{position:absolute;top:2px;right:0;background:#c50f1f;color:#fff;font-size:9.5px;font-weight:700;border-radius:8px;padding:1px 5px}

/* ---------- Painéis / formulário ---------- */
.painel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.form-grid label,.campo label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px}
.form-grid .input,.form-grid select{width:100%}
textarea.input{width:100%;resize:vertical}
.abas{display:flex;gap:8px;margin-bottom:14px}
.aba-btn{cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--sub);font-weight:600;font-size:13.5px;padding:6px 4px}
.aba-btn.ativa{color:var(--accent);border-bottom-color:var(--accent)}

/* ---------- Modal 360 ---------- */
#modal360{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
.modal-caixa{background:var(--card);color:var(--text);border-radius:12px;border:1px solid var(--border);width:min(560px,92vw);padding:20px;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:surgir .18s ease}
@keyframes surgir{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.modal-caixa .topo{display:flex;align-items:center;margin-bottom:12px;font-weight:700;font-size:15px}
.linha360{display:flex;gap:12px;border-bottom:1px solid var(--row-border);padding:8px 0;font-size:13px}
.linha360 .r{width:130px;color:var(--sub);font-size:12px;flex-shrink:0}

/* ---------- Toast ---------- */
#toasts{position:fixed;top:calc(var(--header-h) + 12px);right:20px;z-index:80;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 16px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.18);animation:surgir .2s ease}

/* ---------- Responsivo ---------- */
@media(max-width:860px){
  header{flex-wrap:wrap}
  .topnav{overflow-x:auto}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

<script>
/* ============================================================
   Portal Logístico — protótipo em HTML + CSS + JS puro
   ============================================================ */
"use strict";

const HOJE = new Date(); HOJE.setHours(0,0,0,0);

/* ---------- utilidades ---------- */
const $ = (s) => document.querySelector(s);
const d = (s) => { const [dd,mm,yy] = s.split("/").map(Number); return new Date(yy, mm-1, dd); };
const fmt = (dt) => dt ? dt.toLocaleDateString("pt-BR") : "—";
const diffDias = (a,b) => Math.max(0, Math.round((b-a)/864e5));
const diasUteis = (a,b) => { if(!a||!b||b<a) return 0; let n=0,c=new Date(a); while(c<b){c.setDate(c.getDate()+1); const w=c.getDay(); if(w!==0&&w!==6)n++;} return n; };
const addDiasUteis = (dt,n) => { const c=new Date(dt); let add=0; while(add<n){ c.setDate(c.getDate()+1); const w=c.getDay(); if(w!==0&&w!==6) add++; } return c; };
const addDias = (dt,n) => { const c=new Date(dt); c.setDate(c.getDate()+n); return c; };
const brl = (v) => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
// interpreta valor no formato brasileiro ("4.290,00" → 4290) ou número puro
function parseValor(v){
  if(typeof v === "number") return isNaN(v) ? 0 : v;
  let s = String(v==null ? "" : v).replace(/[^\d.,-]/g,"").trim();  // tira "R$", espaços etc.
  if(!s) return 0;
  const temVirgula = s.indexOf(",") > -1;
  const temPonto   = s.indexOf(".") > -1;
  if(temVirgula && temPonto){          // "4.290,00" → ponto=milhar, vírgula=decimal
    s = s.replace(/\./g,"").replace(",",".");
  } else if(temVirgula){                // "4290,00" → vírgula decimal

// edições do usuário (Entregue / Observação) persistidas por NF
let EDICOES = {};

// códigos: 1 = entregue · 91 = programada · 36 = liberado · M3000 = pendência financeira
// retenção: notas com Cod 26 ou 92 ficam APENAS na aba Retenção
const CODS_RETENCAO = new Set(["26","92"]);
const dBR = (str) => { const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(str||""); return m? new Date(+m[3],+m[2]-1,+m[1]) : null; };

function derivaNota(n){
  const o = Object.assign({}, n);
  o.nf = String(o.nf);
  const ed = EDICOES[o.nf] || {};
  o.entregue = ed.entregue || "";
  o.obs = ed.obs || "";
  const cod = String(o.cod||"").trim().toUpperCase();
  o._codBruto = cod;   // usado na consolidação de retenção por grupo de nota
  // retenção (regra: Cod 26 ou 92 → apenas Retenção; se o grupo da nota também tiver a
  // liberação 36 em outra linha, a nota volta ao seu monitoramento — ver consolidarRetencao)
  o.ehRetida = CODS_RETENCAO.has(cod);
  o.temM3000 = cod === "M3000";
  o.dtOcorD = dBR(o.dtOcor);
  o.dataLib = cod === "36" ? o.dtOcorD : null;
  o.diasRetida = (o.ehRetida && o.dtOcorD) ? diffDias(o.dtOcorD, o.dataLib || HOJE) : 0;
  o.diferenca = (o.dtOcorD && o.dataLib) ? diasUteis(o.dtOcorD, o.dataLib) : null;
  o.prev1D = dBR(o.prev1);
  o.prevD = dBR(o.prev);
  o.novaPrev = (o.prev1D && o.diferenca!=null) ? addDias(o.prev1D, o.diferenca) : null;
  o.foiEntregue = !!o.entr || cod === "1" || !!o.entregue;
  // classificação nos monitoramentos:
  // Tipo Agenda preenchido → c/ Agenda (Redespa 1 preenchido = Redespacho + Agenda; vazio = Transportadora + Agenda)
  // Tipo Agenda vazio e Transportadora preenchida → Redespa 1 preenchido = Redespacho; vazio = Transportadora
  const temRedespacho = !!String(o.redespa1||"").trim();
  const temAgenda = !!String(o.tipoAgenda||"").trim();
  if(o.__origem === "esp_transportadora") o.cat = "esp_Transportadora";        // planilha específica
  else if(o.__origem === "esp_redespacho") o.cat = "esp_Redespacho";
  else if(o.__origem === "transportadora"){
    // planilha da Transportadora: sempre vai para Transportadora (ignora a coluna Redespa)
    o.cat = temAgenda ? "agend_Transportadora" : "mon_Transportadora";
  }
  else if(temAgenda) o.cat = temRedespacho ? "agend_Redespacho" : "agend_Transportadora";
  else if(String(o.transp||"").trim()) o.cat = temRedespacho ? "mon_Redespacho" : "mon_Transportadora";
  else o.cat = "";
  // sem previsão depende da CATEGORIA final:
  // categorias de Redespacho → olha a Prev 1; categorias de Transportadora → olha a Prev
  const catRedespacho = o.cat === "mon_Redespacho" || o.cat === "agend_Redespacho" || o.cat === "esp_Redespacho";
  let semPrev = catRedespacho ? !String(o.prev1||"").trim() : !String(o.prev||"").trim();
  // transportadoras de "carga fechada" (só na coluna Transportadora, sem Redespa 1):
  // não vão para Sem previsão mesmo sem prazo calculado — ficam no monitoramento
  if(semPrev && !temRedespacho && ehCargaFechada(o.transp)) semPrev = false;
  o.semPrevisao = semPrev;
  return o;
}

let NOTAS = [];
const ORIGENS = [
  {k:"transportadora",     l:"Transportadora"},
  {k:"redespacho",         l:"Redespacho"},
  {k:"esp_transportadora", l:"Específico Transportadora"},
  {k:"esp_redespacho",     l:"Específico Redespacho"},
];
function lerDadosV2(){
  let v2 = store.read("pl_dados_v2", null);
  if(!v2){
    const legado = store.read("pl_dados", null);       // migra dados de versões anteriores
    v2 = legado && legado.length ? {geral: legado} : null;
  }
  return v2;
}
function carregarNotas(){
  EDICOES = store.read("pl_edicoes", {}) || {};
  const v2 = lerDadosV2();
  let base = [];
  if(v2){
    Object.keys(v2).forEach(orig => (v2[orig]||[]).forEach(r => base.push(Object.assign({__origem:orig}, r))));
  } else if(store.read("pl_zerado", false)){
    base = [];   // dados foram limpos para teste: fica vazio até uma nova importação
  } else {
    base = AMOSTRA_INICIAL.map(r => Object.assign({__origem:"geral"}, r));
  }
  NOTAS = base.map(derivaNota)
    // regra da planilha Transportadora: olha o 1º percurso de "Dias Ent."
    // (ex.: "2C-5U" → 1º = C; "2U-5U" ou "2U" → 1º = U). Se o 1º percurso for C, a nota sai.
    .filter(n => {
      const catTransp = n.cat === "mon_Transportadora" || n.cat === "agend_Transportadora";
      if(!catTransp) return true;                       // regra só vale para as abas de Transportadora
      if(ehCargaFechada(n.transp)) return true;         // carga fechada (dias corridos) não é removida
      const primeiro = String(n.diasEnt||"").trim().split("-")[0].trim();  // 1º percurso
      const primeiroEhC = /c\s*$/i.test(primeiro);      // termina em C?
      return !primeiroEhC;                              // 1º percurso C → remove
    });
  consolidarRetencao();
  marcarDuplicadas();
}
// Uma nota pode ter várias ocorrências em linhas separadas (mesma NF+Estab).
// Regra: se o grupo tem retenção (26/92) e NÃO tem liberação (36) → todas as linhas ficam retidas.
// Se o grupo tem a liberação 36 → nenhuma linha fica retida (voltou ao monitoramento).
function consolidarRetencao(){
  const grupos = {};
  NOTAS.forEach(n=>{
    const chave = String(n.estab||"").trim()+"|"+String(n.nf||"").trim();
    (grupos[chave] || (grupos[chave]=[])).push(n);
  });
  Object.values(grupos).forEach(linhas=>{
    const linhaRet = linhas.find(n => n._codBruto && CODS_RETENCAO.has(n._codBruto) && n.dtOcorD);
    const temRetencao = linhas.some(n => n._codBruto && CODS_RETENCAO.has(n._codBruto));
    // código que efetivamente disparou a retenção (26 ou 92) — para exibição correta
    const linhaCodRet = linhas.find(n => n._codBruto && CODS_RETENCAO.has(n._codBruto));
    const codRetGrupo = linhaCodRet ? linhaCodRet._codBruto : null;
    // texto por código (fixo): 26 = retida · 92 = problemas fiscais · liberação (36)
    const ocorRetGrupo = codRetGrupo==="92" ? "PROBLEMAS FISCAIS" : "NOTA FISCAL RETIDA PELA FISCALIZACAO";
    const ocorLibGrupo = "NF LIBERADA PELA FISCALIZACAO";
    const linhaLib = linhas.find(n => n._codBruto === "36" && n.dtOcorD);
    const temLib = linhas.some(n => n._codBruto === "36");
    const dataLibGrupo = linhaLib ? linhaLib.dtOcorD : null;
    // data em que a nota ficou retida = data da ocorrência de retenção (linha 26/92)
    const dataRetGrupo = linhaRet ? linhaRet.dtOcorD : null;
    const grupoTemM3000 = linhas.some(n => n._codBruto === "M3000");   // pendência informada
    const grupoTemM3001 = linhas.some(n => n._codBruto === "M3001");   // pendência liberada p/ entrega
    // valores da nota (iguais para todas as linhas do grupo):
    // fim da contagem = data de liberação (36) se houver; senão, hoje
    const fim = dataLibGrupo || HOJE;
    const diasRetGrupo   = dataRetGrupo ? diffDias(dataRetGrupo, fim) : 0;
    const diferencaGrupo = (dataRetGrupo && dataLibGrupo) ? diasUteis(dataRetGrupo, dataLibGrupo) : null;
    linhas.forEach(n=>{
      // se alguma ocorrência da nota é M3000, a coluna "Tem M3000" mostra SIM em todas as linhas
      n.grupoTemM3000 = grupoTemM3000;
      n.grupoTemM3001 = grupoTemM3001;
      // vermelho da M3000 só quando a pendência NÃO foi liberada (não tem M3001)
      n.m3000Pendente = grupoTemM3000 && !grupoTemM3001;
      if(temRetencao){
        // nota com 26/92 fica na Retenção. Se também tem 36 (liberada), continua na Retenção
        // E também aparece no monitoramento — quem quiser acompanhar vê nos dois lugares.
        n.ehRetida = true;
        n.foiLiberada = temLib;
        n.codRetencao = codRetGrupo;                    // código real (26/92) que disparou a retenção
        n.ocorRetencao = ocorRetGrupo;                  // descrição da retenção
        n.ocorLiberacao = ocorLibGrupo;                 // descrição da liberação (36)
        // TODAS as linhas da nota mostram os mesmos valores de retenção
        n.dataLib   = dataLibGrupo;                     // Data de Liberação (mesma em todas)
        n.diasRetida = diasRetGrupo;                    // Dias Retida (conta até a liberação; congela)
        n.diferenca  = diferencaGrupo;                  // Diferença em dias úteis
        // Nova Previsão = (Prev 1 para Redespacho / Prev para Transportadora) + diferença
        const catRedespacho = n.cat === "mon_Redespacho" || n.cat === "agend_Redespacho" || n.cat === "esp_Redespacho";
        const baseData = catRedespacho ? n.prev1D : n.prevD;
        n.novaPrev = (baseData && diferencaGrupo!=null) ? addDias(baseData, diferencaGrupo) : null;
      }
      // grupos sem retenção nenhuma ficam como já estavam (cálculo por linha)
    });
  });
}
// nota "igual" = mesma Nota Fiscal + mesmo Estabelecimento.
// A 1ª de cada grupo repetido é a "principal" (realçada em amarelo); as demais ficam ocultas no Reduzido.
function marcarDuplicadas(){
  const vistos = {};
  NOTAS.forEach(n=>{
    const chave = String(n.estab||"").trim()+"|"+String(n.nf||"").trim();
    if(vistos[chave]===undefined){
      vistos[chave] = 0;
      n.ehDuplicada = false;      // primeira ocorrência
      n.temDuplicata = false;     // será marcada abaixo se houver repetição
    } else {
      n.ehDuplicada = true;       // repetição → oculta no Reduzido
    }
    vistos[chave]++;
    n._chaveDup = chave;
  });
  // marca a primeira de cada grupo que tem repetição (para o realce)
  const grupos = {};
  NOTAS.forEach(n=>{ grupos[n._chaveDup] = (grupos[n._chaveDup]||0)+1; });
  NOTAS.forEach(n=>{ if(!n.ehDuplicada && grupos[n._chaveDup] > 1) n.temDuplicata = true; });
}
function salvarEdicao(nf, campo, valor){
  nf = String(nf);
  if(!EDICOES[nf]) EDICOES[nf] = {};
  EDICOES[nf][campo] = valor;
  store.write("pl_edicoes", EDICOES);
  const n = NOTAS.find(x=>x.nf===nf);
  if(n){ n[campo] = valor; Object.assign(n, derivaNota(n)); }
}

// ordem: 🔴 M3000 (pendente) · 🟢 Liberado retenção · 🔵 Agend. transportadora
function dotEstab(n){
  let dots = "";
  if(n.m3000Pendente) dots += '<span class="dot-linha dl-m3000" title="M3000"></span>';
  if(n.foiLiberada)   dots += '<span class="dot-linha dl-liberado" title="Liberado retenção"></span>';
  const catAgenda = n.cat === "agend_Transportadora" || n.cat === "agend_Redespacho";
  if(catAgenda && String(n.tipoAgenda||"").trim().toLowerCase() === "transportadora")
    dots += '<span class="dot-linha dl-agenda" title="Agend. transportadora"></span>';
  return dots ? '<span class="dots-estab">'+dots+'</span>' : "";
}
// texto dos status (usado p/ ordenar/filtrar a coluna de bolinhas)
function sinalTexto(n){
  const t = [];
  if(n.m3000Pendente) t.push("M3000");
  if(n.foiLiberada)   t.push("Liberado");
  const catAgenda = n.cat === "agend_Transportadora" || n.cat === "agend_Redespacho";
  if(catAgenda && String(n.tipoAgenda||"").trim().toLowerCase() === "transportadora") t.push("Agend.");
  return t.join(" ");
}
// completa a NF com zeros à esquerda até 7 dígitos (só p/ exibição; NFs numéricas)

/* ---------- exportação de ocorrências (XLSX) ---------- */
// Série: Estab 9,10,40 → 1 · Estab 1,20 → 5
function serieDoEstab(estab){
  const e = String(estab||"").trim();
  if(["9","10","40"].includes(e)) return "1";
  if(["1","20"].includes(e)) return "5";
  return "";
}
// Trecho: monitoramento Transportadora → 1 · Redespacho → 2
function trechoDaNota(n){
  if(n.cat==="mon_Transportadora" || n.cat==="agend_Transportadora" || n.cat==="esp_Transportadora") return "1";
  if(n.cat==="mon_Redespacho" || n.cat==="agend_Redespacho" || n.cat==="esp_Redespacho") return "2";
  return "";
}
function exportarOcorrencia(id){
  const rows = window["__rows_"+id] || [];
  // só notas que TENHAM data na coluna Entregue
  const notas = rows.filter(n => n.entregue && /^(\d{2})\/(\d{2})\/(\d{4})$/.test(n.entregue));
  if(!notas.length){ toast("Nenhuma nota com data na coluna Entregue para gerar o relatório."); return; }
  const cabecalho = ["Estabelecimento","Série","Nota Fiscal","Trecho","Descrição","Tipo","Data Ocorrencia","Hora Ocorrência"];
  const linhas = notas.map(n => [
    String(n.estab||""),          // Estabelecimento = próprio Estab
    serieDoEstab(n.estab),        // Série conforme regra
    String(n.nf||""),             // Nota Fiscal
    trechoDaNota(n),              // Trecho conforme monitoramento
    "Entregue",                   // Descrição
    "01",                         // Tipo (fixo)
    n.entregue,                   // Data Ocorrência = data da coluna Entregue
    "23:59",                      // Hora Ocorrência (fixo)
  ]);
  const nomeArq = "RSGT25.xlsx";
  if(typeof XLSX !== "undefined"){
    const ws = XLSX.utils.aoa_to_sheet([cabecalho, ...linhas]);
    ws["!cols"] = cabecalho.map(()=>({wch:15}));   // largura 15 em todas as colunas
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Ocorrências");
    XLSX.writeFile(wb, nomeArq);
  } else {
    baixarCSV("RSGT25.csv", cabecalho, linhas);
  }
  toast(notas.length+" ocorrência(s) exportada(s).");
}

/* ---------- exportação ---------- */
function baixarCSV(nome, cabecalhos, linhas){
  const csv = [cabecalhos.join(";")].concat(linhas.map(l=>l.join(";"))).join("\n");
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nome;
  a.click();
  URL.revokeObjectURL(a.href);
}

const valorCelula = (c, r) => { const v = c.raw ? c.raw(r) : (r[c.key] ?? ""); return (v===null||v===undefined) ? "" : String(v); };

// valores distintos da coluna (a partir de todas as linhas), ordenados
function valoresDistintos(c, rows){
  const set = new Set();
  rows.forEach(r => set.add(valorCelula(c, r) || "(vazias)"));
  const arr = [...set];
  const todosNum = arr.every(v => v==="(vazias)" || !isNaN(parseFloat(v.replace(/\./g,"").replace(",","."))));
  arr.sort((a,b)=>{
    if(a==="(vazias)") return 1; if(b==="(vazias)") return -1;
    if(todosNum){ return parseFloat(a.replace(/\./g,"").replace(",","."))-parseFloat(b.replace(/\./g,"").replace(",",".")); }
    return a.localeCompare(b,"pt-BR");
  });
  return arr;
}

function renderGrid(id, cols, rows, nomeExport){
  const g = gridEstado(id);
  window["__cols_"+id] = cols;   // usados pelos helpers de filtro
  window["__rows_"+id] = rows;
  const visiveis = cols.filter(c => !COLS_OCULTAS_GLOBAL.includes(c.key) && !(g.reduzido && COLS_REDUZIDO.includes(c.key)));

  let dados = rows;
  // no modo Reduzido, esconde as notas repetidas (mesma NF+Estab); no Total mostra todas
  if(g.reduzido) dados = dados.filter(n => !n.ehDuplicada);
  // filtros por coluna (estilo Excel)
  Object.keys(g.filtros).forEach(k=>{
    const permitidos = g.filtros[k];
    if(!permitidos) return;
    const c = cols.find(x=>x.key===k); if(!c) return;
    const set = new Set(permitidos);
    dados = dados.filter(r => set.has(valorCelula(c,r) || "(vazias)"));
  });
  // filtros de período (De/Até) em colunas de data
  Object.keys(g.periodos).forEach(k=>{
    const per = g.periodos[k]; if(!per || (!per.de && !per.ate)) return;
    const c = cols.find(x=>x.key===k); if(!c) return;
    const de = per.de ? new Date(per.de) : null, ate = per.ate ? new Date(per.ate) : null;
    dados = dados.filter(r=>{
      const s = valorCelula(c,r);
      const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
      if(!m) return false;
      const dt = new Date(+m[3], +m[2]-1, +m[1]);
      if(de && dt < de) return false;
      if(ate && dt > ate) return false;
      return true;
    });
  });
  // busca livre
  if(g.busca){
    const q = g.busca.toLowerCase();
    dados = dados.filter(r => cols.some(c => valorCelula(c,r).toLowerCase().includes(q)));
  }
  // ordenação
  if(g.sort){
    const c = cols.find(x => x.key===g.sort.key);
    dados = dados.slice().sort((a,b)=>{
      const va = c.sortVal ? c.sortVal(a) : (a[c.key] ?? ""), vb = c.sortVal ? c.sortVal(b) : (b[c.key] ?? "");
      return (va>vb?1:va<vb?-1:0)*(g.sort.dir==="asc"?1:-1);
    });
  }
  const pagina = dados; // sem paginação: todos numa página
  window["__ordem_"+id] = pagina.map(r=>r.nf);   // ordem atual (p/ seleção com Shift)

  window["__export_"+id] = () => baixarCSV(nomeExport+".csv",
    visiveis.map(c=>c.label),
    dados.map(r=>visiveis.map(c=>c.raw ? c.raw(r) : (r[c.key] ?? ""))));

  // colunas congeladas por CHAVE (offsets calculados dinamicamente, ignora as ocultas)
  const LARG_FIXA = {sinal:54, estab:60, repres:104, nf:92};
  let accLeft = 0, ultimaFixa = null;
  const leftFixa = {};
  visiveis.forEach(c=>{ if(LARG_FIXA[c.key]!=null){ leftFixa[c.key]=accLeft; accLeft+=LARG_FIXA[c.key]; ultimaFixa=c.key; } });
  const attrsFixa = (c)=>{
    if(LARG_FIXA[c.key]==null) return "";
    const w = LARG_FIXA[c.key];

/* ---- filtro estilo Excel ---- */
function abrirFiltro(ev, id, colKey){
  ev.stopPropagation();
  const g = gridEstado(id);
  g.filtroCol = colKey;
  g.fBusca = "";
  // seleção temporária: parte do filtro salvo (se houver) ou de "tudo" (materializado no render)
  g.fTemp = g.filtros[colKey] ? new Set(g.filtros[colKey]) : null;
  g.perTemp = g.periodos[colKey] ? {de:g.periodos[colKey].de||"", ate:g.periodos[colKey].ate||""} : {de:"", ate:""};
  // posiciona o popup abaixo do cabeçalho clicado
  const th = ev.currentTarget.getBoundingClientRect();
  const larguraPop = 260, margem = 8;
  let x = th.left; if(x + larguraPop > window.innerWidth - margem) x = window.innerWidth - larguraPop - margem;
  g.popX = Math.max(margem, x);
  g.popY = th.bottom + 4;
  // garante espaço vertical suficiente (colunas de data têm a seção Período e precisam de mais)
  const ehData = (window["__cols_"+id]||[]).some(c=>c.key===colKey && c.tipo==="data");
  const alturaDesejada = Math.min(ehData ? 620 : 470, window.innerHeight - 2*margem);
  if(window.innerHeight - g.popY < alturaDesejada) g.popY = Math.max(margem, window.innerHeight - alturaDesejada);
  render();
}
function ordenarCol(id, key, dir){
  const g = gridEstado(id); g.sort = {key, dir}; g.filtroCol = null; g.fTemp = null; render();
}
function filtroToggle(id, val){
  const g = gridEstado(id);
  if(!(g.fTemp instanceof Set)) return;
  if(g.fTemp.has(val)) g.fTemp.delete(val); else g.fTemp.add(val);
  render();
}
function filtroBusca(id, texto){
  const g = gridEstado(id); g.fBusca = texto; render(document.activeElement && document.activeElement.tagName==="INPUT");
}
function filtroTodos(id){
  const g = gridEstado(id);
  const c = window["__cols_"+id].find(x=>x.key===g.filtroCol);
  const distintos = valoresDistintos(c, window["__rows_"+id]);
  const q = (g.fBusca||"").toLowerCase();
  const visiveis = distintos.filter(v=>v.toLowerCase().includes(q));
  if(!(g.fTemp instanceof Set)) g.fTemp = new Set(distintos);
  const todos = visiveis.every(v=>g.fTemp.has(v));
  visiveis.forEach(v=> todos ? g.fTemp.delete(v) : g.fTemp.add(v));
  render();
}
function aplicarFiltro(id){
  const g = gridEstado(id);
  const c = window["__cols_"+id].find(x=>x.key===g.filtroCol);
  const distintos = valoresDistintos(c, window["__rows_"+id]);
  const sel = (g.fTemp instanceof Set) ? [...g.fTemp] : distintos.slice();
  if(sel.length === distintos.length) delete g.filtros[g.filtroCol]; // tudo marcado = sem filtro
  else if(sel.length === 0){ toast("Selecione ao menos um valor."); return; }
  else g.filtros[g.filtroCol] = sel;
  // período
  const per = g.perTemp || {};
  if(per.de || per.ate) g.periodos[g.filtroCol] = {de:per.de||"", ate:per.ate||""};
  else delete g.periodos[g.filtroCol];
  g.filtroCol = null; g.fTemp = null; g.perTemp = null; g.fBusca = "";
  render();
}
function limparFiltroCol(id, key){
  const g = gridEstado(id); delete g.filtros[key]; delete g.periodos[key]; g.filtroCol = null; g.fTemp = null; g.perTemp = null; render();
}
function fecharFiltro(id){
  const g = gridEstado(id); g.filtroCol = null; g.fTemp = null; g.perTemp = null; g.fBusca = ""; render();
}
function periodoTemp(id, campo, valor){
  const g = gridEstado(id); if(!g.perTemp) g.perTemp = {de:"",ate:""}; g.perTemp[campo] = valor; render();
}
function limparPeriodoTemp(id){
  const g = gridEstado(id); g.perTemp = {de:"",ate:""}; render();
}

/* ---- seleção de linhas ---- */
function selecionarLinha(ev, id, nf){
  const g = gridEstado(id);
  const ordem = window["__ordem_"+id] || [];
  if(ev.shiftKey && g.selAnchor){
    const a = ordem.indexOf(g.selAnchor), b = ordem.indexOf(nf);
    if(a>-1 && b>-1){ const [ini,fim]=[Math.min(a,b),Math.max(a,b)]; g.sel = new Set(); for(let i=ini;i<=fim;i++) g.sel.add(ordem[i]); }
  } else if(ev.ctrlKey || ev.metaKey){
    if(g.sel.has(nf)) g.sel.delete(nf); else g.sel.add(nf);
    g.selAnchor = nf;
  } else {
    g.sel = new Set([nf]); g.selAnchor = nf;
  }
  // atualiza SÓ as classes das linhas e o contador — evita re-render da página inteira (rápido em tabelas grandes)
  const tabela = ev.target.closest("table");
  if(tabela){
    tabela.querySelectorAll("tr[data-nf]").forEach(tr=>{
      tr.classList.toggle("sel", g.sel.has(tr.getAttribute("data-nf")));
    });
    atualizarBarraSel(id, g);
  } else {
    render();  // fallback improvável
  }
}
// atualiza só o contador "X selecionada(s)" sem reconstruir a barra toda
function atualizarBarraSel(id, g){
  const slot = document.getElementById("barrasel_"+id);
  if(!slot) return;
  const n = g.sel.size;
  slot.innerHTML = n
    ? '<span style="font-size:12px;color:var(--accent);font-weight:600">'+n+' selecionada(s)</span>'
      + '<button class="btn pequeno" onclick="limparSelecao(\''+id+'\')">Limpar seleção</button>'
    : "";
}
function limparSelecao(id){
  const g = gridEstado(id); g.sel = new Set(); g.selAnchor = null;
  const tabela = document.querySelector(".tabela-wrap table");
  if(tabela){ tabela.querySelectorAll("tr[data-nf].sel").forEach(tr=>tr.classList.remove("sel")); atualizarBarraSel(id, g); }
  else render();
}

/* ---- rastreamento SSW ---- */
function rastrearSSW(id){
  const g = gridEstado(id);
  const nfs = [...g.sel];
  if(!nfs.length){ toast("Selecione ao menos uma nota para rastrear no SSW."); return; }
  toast("Abrindo rastreamento SSW para "+nfs.length+" nota(s): "+nfs.join(", "));
  try { window.open("https://ssw.inf.br/2/rastreamento", "_blank", "noopener"); } catch(e){}
}

function ordenarGrid(id, key){
  const g = gridEstado(id);
  g.sort = (g.sort && g.sort.key===key && g.sort.dir==="asc") ? {key, dir:"desc"} : {key, dir:"asc"};
  render();
}
function buscarGrid(id, v){
  const g = gridEstado(id); g.busca = v;
  render(document.activeElement && document.activeElement.tagName==="INPUT");
}
function alternarColuna(id, key){
  COLS_OCULTAS_GLOBAL = COLS_OCULTAS_GLOBAL.includes(key)
    ? COLS_OCULTAS_GLOBAL.filter(k=>k!==key)
    : COLS_OCULTAS_GLOBAL.concat(key);
  salvarColsOcultas();
  const g = gridEstado(id); g.menuCol = true; render();
}
function alternarMenuCol(id){
  const g = gridEstado(id); g.menuCol = !g.menuCol; render();
}

/* ---------- indicadores ---------- */
function kpis(){
  const f = notasFiltradas().filter(n => !n.ehDuplicada);   // não conta repetidas
  return {
    total:f.length,
    retidas:f.filter(n=>n.ehRetida && !n.foiLiberada).length,   // só conta as ainda retidas (exclui as já liberadas na Retenção)
    semPrev:f.filter(n=>n.semPrevisao).length,
    m3000:f.filter(n=>n.temM3000).length,
  };
}
function kpisRetencao(){
  const r = soRetidas().filter(n => !n.ehDuplicada);   // não conta as repetidas
  const retidasPuras = r.filter(n => !n.foiLiberada);  // realmente retidas (26/92 sem 36)
  const liberadas    = r.filter(n => n.foiLiberada);   // retidas que já têm a liberação 36
  return {
    total:retidasPuras.length,                          // Total Retidas = só as sem 36
    liberadas:liberadas.length,                         // Total Liberadas = as com 36
    m3000:r.filter(n=>n.grupoTemM3000).length,
    media:r.length ? (r.reduce((s,n)=>s+n.diasRetida,0)/r.length).toFixed(1) : 0,
    maior:r.length ? Math.max.apply(null, r.map(n=>n.diasRetida)) : 0,
  };
}

  return '<button class="card '+ativo+'" '+clique+'><div class="rotulo">'+esc(label)+'</div><div class="valor" style="color:'+(cor||"var(--text)")+'">'+valor+'</div></button>';

const MON_KEYS = ["mon_Transportadora","mon_Redespacho","agend_Transportadora","agend_Redespacho","esp_Transportadora","esp_Redespacho"];
const PREV_KEYS = MON_KEYS.map(k=>"prev_"+k);
// requisito de acesso por aba
function reqDaTab(k){
  if(k==="comprovantes") return "comprovantes";
  if(k==="usuarios") return "usuarios";
  if(k==="config") return "config";
  return "operacional";
}
const tabPermitida = (u, k) => {
  if(k === "upload" && u && u.perfil === "Consulta") return false;   // Upload é exclusivo de quem opera (não Consulta)
  return temAcesso(u, reqDaTab(k));
};

function mudarTabOp(k){ estado.tabOp = k; estado.filtroCard = null; render(); }
function mudarTabPrev(k){ estado.tabPrev = k; render(); }
function irPreventivo(sub){ estado.tabOp = "preventivo"; estado.tabPrev = sub; estado.filtroCard = null; render(); }

// abre/fecha o menu suspenso ao clicar (o hover também abre, via CSS)
function toggleDrop(ev, id){
  ev.stopPropagation();
  const alvo = document.getElementById(id);
  const abertoAgora = alvo.classList.contains("aberto");
  document.querySelectorAll(".nav-drop.aberto").forEach(el=>el.classList.remove("aberto"));
  if(!abertoAgora) alvo.classList.add("aberto");
}
document.addEventListener("click", ()=>document.querySelectorAll(".nav-drop.aberto").forEach(el=>el.classList.remove("aberto")));

function barraTabs(){
  const t = estado.tabOp || "resumo";
  const u = estado.usuario;
  const monAtivo = MON_KEYS.includes(t);
  const prevAtivo = (t === "preventivo") || PREV_KEYS.includes(t);

  return '<nav class="topnav">' + NAV.filter(grp=>temAcesso(u, grp.req) && !(grp.k==="upload" && u && u.perfil==="Consulta")).map((grp, gi)=>{
    if(grp.tipo === "item"){
      const ativa = (t === grp.k);
      return '<button class="nav-btn '+(ativa?"ativa":"")+'" onclick="mudarTabOp(\''+grp.k+'\')">'
        + svgIcon(NAV_ICONES[grp.ic]) + '<span>'+esc(grp.l)+'</span></button>';
    }
    // dropdown
    const id = "drop_"+gi;
    const grpAtivo = (grp.ic === "mon" && monAtivo) || (grp.ic === "prev" && prevAtivo);
    const itens = grp.itens.map(it=>{
      const isPrev = it.k.indexOf("prev:") === 0;
      const chave = isPrev ? it.k.slice(5) : it.k;
      const ativa = isPrev ? (prevAtivo && estado.tabPrev === chave) : (t === it.k);
      const acao = isPrev ? "irPreventivo('"+chave+"')" : "mudarTabOp('"+chave+"')";
      return '<button class="nav-menu-item '+(ativa?"ativa":"")+'" onclick="'+acao+'">'+esc(it.l)+'</button>';
    }).join("");
    return '<div class="nav-drop '+(grpAtivo?"grp-ativo":"")+'" id="'+id+'">'
      + '<button class="nav-btn '+(grpAtivo?"ativa":"")+'" onclick="toggleDrop(event,\''+id+'\')">'
      +   svgIcon(NAV_ICONES[grp.ic]) + '<span>'+esc(grp.l)+'</span>'
      +   svgIcon(NAV_ICONES.chev, 15).replace("nav-ic","nav-ic chev")
      + '</button>'
      + '<div class="nav-menu">'+itens+'</div>'
      + '</div>';
  }).join("") + '</nav>';
}

function conteudoTabOp(){
  const t = estado.tabOp || "resumo";
  if(t==="resumo")   return blocoResumo();
  if(t==="semprev")  return blocoSemPrevisao();
  if(t==="retencao") return blocoRetencao();
  if(t==="preventivo" || t.indexOf("prev_")===0) return blocoPreventivo(t);
  if(t==="upload")   return blocoUpload();
  if(t==="comprovantes") return paginaComprovantes();
  if(t==="usuarios") return paginaUsuarios();
  if(t==="config")   return paginaConfig();
  // uma das seis categorias de monitoramento
  const label = LABELS_OP[t] || "Monitoramento";
  const linhas = notasDaCategoria(t);
  return tituloComLegenda(label, contarUnicas(linhas), t)
    + renderGrid(t, COLS_MON, linhas, t.toLowerCase());
}
// conta apenas notas únicas (não conta as repetidas por NF+Estab)
function contarUnicas(linhas){ return linhas.filter(n => !n.ehDuplicada).length; }

function paginaOperacional(){
  return barraTabs() + '<div style="margin-top:16px">' + conteudoTabOp() + '</div>';
}

function blocoResumo(){
  const k = kpis();
  const rf = estado.rf || (estado.rf = {cat:"Todos", transp:"Todos", uf:"Todos"});
  let f = notasFiltradas().filter(n => !n.ehDuplicada);   // resumo conta só notas únicas

  const CATS = [
    {k:"mon_Transportadora", l:"Transportadora"},
    {k:"mon_Redespacho", l:"Redespacho"},
    {k:"agend_Transportadora", l:"Transportadora c/ Agenda"},
    {k:"agend_Redespacho", l:"Redespacho c/ Agenda"},
    {k:"__retencao", l:"Retenção"},
    {k:"esp_Redespacho", l:"Específico Redespacho"},
    {k:"esp_Transportadora", l:"Específico Transportadora"},
  ];
  // aplica os filtros do resumo (dropdowns + cards clicáveis)
  const fc = estado.filtroCard;
  // categorias de Redespacho: a transportadora relevante é a do Redespa 1, não a coluna Transportadora
  const CATS_REDESPACHO = ["mon_Redespacho","agend_Redespacho","esp_Redespacho"];
  const campoTransp = CATS_REDESPACHO.includes(rf.cat) ? "redespa1" : "transp";
  const fSel = f.filter(n =>
    (rf.cat==="Todos" || (rf.cat==="__retencao" ? (n.ehRetida && !n.foiLiberada) : n.cat===rf.cat)) &&
    (rf.transp==="Todos" || n[campoTransp]===rf.transp) &&
    (rf.uf==="Todos" || n.uf===rf.uf) &&
    (!fc || (fc==="retidas" ? (n.ehRetida && !n.foiLiberada) : fc==="semPrev" ? n.semPrevisao : n.temM3000)));
  const filtrando = rf.cat!=="Todos" || rf.transp!=="Todos" || rf.uf!=="Todos" || !!fc;
  const base = filtrando ? fSel : f;

  const totalNF = base.length || 1;
  const rs = estado.rfSort || (estado.rfSort = {cat:{k:"notas",d:-1}, transp:{k:"notas",d:-1}, uf:{k:"notas",d:-1}});
  const ordena = (lista, cfg) => lista.slice().sort((a,b)=>{
    const va = cfg.k==="nome" ? a[0] : a[1], vb = cfg.k==="nome" ? b[0] : b[1];
    return (va>vb?1:va<vb?-1:0)*cfg.d;
  });
  const setaOrd = (painel, key) => {
    const c = rs[painel];
    return c.k===key ? '<span class="rf-seta">'+(c.d===1?"▲":"▼")+'</span>' : '<span class="rf-seta neutra">⇅</span>';
  };

  const outroFiltro = rf.transp!=="Todos" || rf.uf!=="Todos" || !!fc;
  let listaCat = CATS.map(c=>{
    const n = c.k==="__retencao" ? base.filter(x=>x.ehRetida).length : base.filter(x=>x.cat===c.k).length;
    return {k:c.k, l:c.l, n};
  });
  if(outroFiltro) listaCat = listaCat.filter(x=>x.n>0);   // com filtro ativo, só o que tem informação
  listaCat = listaCat.slice().sort((a,b)=>{
    const va = rs.cat.k==="nome"?a.l:a.n, vb = rs.cat.k==="nome"?b.l:b.n;
    return (va>vb?1:va<vb?-1:0)*rs.cat.d;
  });
  const rowsCat = listaCat.map(x=>
    '<tr class="clicavel'+(rf.cat===x.k?" ativa":"")+'" onclick="resumoFiltro(\'cat\',\''+x.k+'\')"><td>'+esc(x.l)+'</td><td class="num">'+x.n+'</td><td class="num">'+((x.n/totalNF)*100).toFixed(1)+'%</td></tr>').join("");

  const porTransp = {}; base.forEach(n=>{ const v = n[campoTransp]||"(sem)"; porTransp[v]=(porTransp[v]||0)+1; });
  const listaTransp = ordena(Object.entries(porTransp), rs.transp);
  const rowsTransp = listaTransp.map(([t,n])=>'<tr class="clicavel'+(rf.transp===t?" ativa":"")+'" onclick="resumoFiltro(\'transp\',\''+esc(t).replace(/'/g,"\\'")+'\')"><td>'+esc(t)+'</td><td class="num">'+n+'</td></tr>').join("");

  const porUF = {}; base.forEach(n=>{ porUF[n.uf||"(sem)"]=(porUF[n.uf||"(sem)"]||0)+1; });
  const listaUF = ordena(Object.entries(porUF), rs.uf);
  const rowsUF = listaUF.map(([u,n])=>'<tr class="clicavel'+(rf.uf===u?" ativa":"")+'" onclick="resumoFiltro(\'uf\',\''+esc(u)+'\')"><td>'+esc(u)+'</td><td class="num">'+n+'</td></tr>').join("");

  // infográfico (barras) quando há filtro aplicado
  let grafico = "";
  if(filtrando){
    // dimensão do gráfico: a que NÃO está filtrada, priorizando transportadora > UF > categoria
    let dim, titulo;
    if(rf.transp==="Todos"){ dim = listaTransp.slice(0,10); titulo = campoTransp==="redespa1" ? "Notas por redespacho" : "Notas por transportadora"; }
    else if(rf.uf==="Todos"){ dim = listaUF.slice(0,10); titulo = "Notas por UF"; }
    else { dim = CATS.map(c=>[c.l, c.k==="__retencao"? base.filter(x=>x.ehRetida).length : base.filter(x=>x.cat===c.k).length]).filter(x=>x[1]>0); titulo = "Notas por categoria"; }
    const max = Math.max.apply(null, dim.map(d=>d[1]).concat([1]));
    const barras = dim.map(([nome,qtd])=>
      '<div class="ig-row"><span class="ig-nome">'+esc(nome)+'</span>'
      + '<div class="ig-track"><div class="ig-bar" style="width:'+Math.max(3,(qtd/max)*100)+'%"></div></div>'
      + '<span class="ig-val">'+qtd+'</span></div>').join("");
    grafico = '<div class="painel-info azul" style="margin-bottom:16px">'
      + '<div class="pi-tit"><span class="pi-dot azul"></span>Infográfico — '+esc(titulo)+' ('+base.length+' notas no filtro)</div>'
      + '<div class="ig">'+barras+'</div></div>';
  }

  return `
    <div class="cards">
      ${cardHTML("Total de Notas",k.total,null,null)}
      ${cardHTML("Retidas",k.retidas,"var(--vermelho)","retidas")}
      ${cardHTML("Sem Previsão",k.semPrev,"var(--laranja)","semPrev")}
      ${cardHTML("M3000",k.m3000,"var(--vermelho)","m3000")}
      <div class="busca-nota">
        <label>Pesquisar nota</label>
        <div style="display:flex;gap:6px">
          <input class="input" id="buscaNota" placeholder="nº da nota fiscal…" onkeydown="if(event.key==='Enter')buscarNota()">
          <button class="btn primario pequeno" onclick="buscarNota()">Buscar</button>
        </div>
      </div>
    </div>
    <div class="resumo-filtros">
      <span style="font-size:12px;color:var(--sub)">Clique nas linhas dos painéis para filtrar (clique novamente para desfazer).</span>
      ${filtrando?'<button class="btn pequeno" onclick="limparResumoFiltros()">✕ Limpar filtros</button>':""}
    </div>
    ${grafico}
    <div class="resumo-grid">
      <div class="painel-info azul">
        <div class="pi-tit"><span class="pi-dot azul"></span>Totais por categoria de monitoramento</div>
        <table class="tbl-info">
          <thead><tr><th class="ordenavel" onclick="ordenarResumo('cat','nome')">Aba ${setaOrd('cat','nome')}</th><th class="num ordenavel" onclick="ordenarResumo('cat','notas')">Notas ${setaOrd('cat','notas')}</th><th class="num ordenavel" onclick="ordenarResumo('cat','notas')">% ${setaOrd('cat','notas')}</th></tr></thead>
          <tbody>${rowsCat}
            <tr class="total"><td>Total de NFs</td><td class="num">${base.length}</td><td class="num">100%</td></tr>
          </tbody>
        </table>
      </div>
      <div class="painel-info azul">
        <div class="pi-tit"><span class="pi-dot azul"></span>${campoTransp==="redespa1"?"Por redespacho":"Por transportadora"} (${listaTransp.length})</div>
        <div class="tbl-scroll">
        <table class="tbl-info">
          <thead><tr><th class="ordenavel" onclick="ordenarResumo('transp','nome')">${campoTransp==="redespa1"?"Redespacho":"Transportadora"} ${setaOrd('transp','nome')}</th><th class="num ordenavel" onclick="ordenarResumo('transp','notas')">Notas ${setaOrd('transp','notas')}</th></tr></thead>
          <tbody>${rowsTransp}</tbody>
        </table>
        </div>
      </div>
      <div class="painel-info verde">
        <div class="pi-tit"><span class="pi-dot verde"></span>Por UF de destino (${listaUF.length})</div>
        <div class="tbl-scroll">
        <table class="tbl-info">
          <thead><tr><th class="ordenavel" onclick="ordenarResumo('uf','nome')">UF ${setaOrd('uf','nome')}</th><th class="num ordenavel" onclick="ordenarResumo('uf','notas')">Notas ${setaOrd('uf','notas')}</th></tr></thead>
          <tbody>${rowsUF}</tbody>
        </table>
        </div>
      </div>
    </div>`;
}
function buscarNota(){
  const el = $("#buscaNota"); const termo = (el && el.value || "").trim();
  if(!termo){ toast("Digite o número da nota fiscal."); return; }
  let n = NOTAS.find(x => x.nf === termo) || NOTAS.find(x => x.nf.includes(termo));
  if(!n){ toast("Nenhuma nota encontrada com \""+termo+"\"."); return; }
  if(transpOculta(n.transp)){ toast("A NF "+n.nf+" pertence a uma transportadora oculta ("+n.transp+"). Reexiba-a em Configurações para visualizar."); return; }
  // em qual aba ela mora?
  const aba = n.ehRetida ? "retencao" : n.semPrevisao ? "semprev" : (n.cat || "mon_Transportadora");
  const rotulos = Object.assign({retencao:"Retenção", semprev:"Sem previsão"}, LABELS_OP);
  // limpa filtros da grid de destino e seleciona a linha para destacar
  const gridId = aba === "retencao" ? "ret" : aba;   // a grid da Retenção usa o id "ret"
  const g = gridEstado(gridId);
  g.busca = ""; g.filtros = {}; g.periodos = {}; g.sel = new Set([n.nf]); g.selAnchor = n.nf;
  estado.tabOp = aba; estado.filtroCard = null;
  render();
  toast("NF "+n.nf+" encontrada em: "+(rotulos[aba]||aba));
  // rola até a linha destacada
  setTimeout(()=>{ const tr = document.querySelector("#conteudo tbody tr.sel"); if(tr && tr.scrollIntoView) tr.scrollIntoView({block:"center", behavior:"smooth"}); }, 60);
}
function ordenarResumo(painel, key){
  const rs = estado.rfSort || (estado.rfSort = {cat:{k:"notas",d:-1}, transp:{k:"notas",d:-1}, uf:{k:"notas",d:-1}});
  const c = rs[painel];
  if(c.k === key) c.d = -c.d; else { c.k = key; c.d = key==="nome" ? 1 : -1; }
  render();
}
function resumoFiltro(campo, valor){
  if(!estado.rf) estado.rf = {cat:"Todos", transp:"Todos", uf:"Todos"};
  estado.rf[campo] = (estado.rf[campo] === valor) ? "Todos" : valor;   // alterna
  render();
}
function limparResumoFiltros(){ estado.rf = {cat:"Todos", transp:"Todos", uf:"Todos"}; estado.filtroCard = null; render(); }

function blocoSemPrevisao(){
  const sub = estado.tabSemPrev || "mon_Transportadora";
  const strip = '<div class="tabs-prev">'+TABS_PREV.map(t=>
    '<button class="tab-prev '+(sub===t.k?"ativa":"")+'" onclick="mudarTabSemPrev(\''+t.k+'\')">'+esc(t.l)+'</button>'
  ).join("")+'</div>';
  // notas dessa categoria que estão sem previsão (notasDaCategoria já exclui semPrevisao, então filtramos a base)
  const linhas = notasFiltradas().filter(n => n.cat === sub && !n.ehRetida && n.semPrevisao);
  const rot = (TABS_PREV.find(x=>x.k===sub)||{}).l || "";
  return `
    <h2 style="margin-top:16px">Sem previsão</h2>
    <p class="sub-texto">Redespacho: sem Prev 1 · Transportadora: sem Prev. Separadas por tipo de monitoramento.</p>
    ${strip}
    ${tituloComLegenda(rot, contarUnicas(linhas), sub).replace('<h2>','<h3 style="font-size:14px">').replace('</h2>','</h3>')}
    ${renderGrid("semprev_"+sub, COLS_MON, linhas, "sem_previsao_"+sub.toLowerCase())}`;
}
function mudarTabSemPrev(k){ estado.tabSemPrev = k; render(); }

function blocoPreventivo(t){
  // t = "preventivo" (todos) ou "prev_<categoria>"
  const cat = (t && t.indexOf("prev_")===0) ? t.slice(5) : null;
  const rot = cat ? (LABELS_OP[cat] || "Preventivo") : "Preventivo";
  const linhas = (cat ? notasDaCategoria(cat) : notasFiltradas()).filter(ehPreventivo);
  const gid = cat ? ("prev_"+cat) : "preventivo";
  return tituloComLegenda(rot, contarUnicas(linhas), cat)
    + renderGrid(gid, COLS_MON, linhas, gid);
}

function blocoUpload(){
  const pode = podeEditar(estado.usuario);
  const meta = store.read("pl_import_meta", {}) || {};
  const areas = ORIGENS.map(o=>{
    const m = meta[o.k];
    const info = m ? '<div class="up-meta">'+esc(m.arquivo)+' · '+m.qtd+' notas<br>'+esc(m.data)+' '+esc(m.hora)+' por '+esc(m.por)+'</div>'
                   : '<div class="up-meta vazio">Nenhuma planilha importada.</div>';
    return `
      <div class="painel dropzone dz-mini" ${pode?`onclick="importarPara('${o.k}')"`:""} style="${pode?"":"opacity:.55;cursor:default"}">
        <div style="font-size:24px;line-height:1">⬆</div>
        <div style="font-weight:700;margin-top:6px">${esc(o.l)}</div>
        <div style="font-size:11.5px;color:var(--sub);margin-top:3px">.xlsx, .xls ou .csv</div>
        ${info}
      </div>`;
  }).join("");
  return `
    <h2 style="margin-top:16px">Importar planilhas</h2>
    <p class="sub-texto">Importe o relatório de cada monitoramento na sua área. As notas de cada planilha alimentam as abas correspondentes — as regras de agenda, retenção (Cod 26/92) e sem previsão continuam valendo. Comprovantes de entrega são anexados na aba Comprovantes.</p>
    ${pode ? "" : '<p class="sub-texto" style="color:var(--vermelho)">Seu perfil não tem permissão para importar planilhas.</p>'}
    <div class="upload-grid">${areas}</div>
    ${estado.atualizacao ? '<p class="sub-texto" style="margin-top:14px">Última publicação: <b>'+esc(estado.atualizacao.data)+', '+esc(estado.atualizacao.hora)+'</b> por '+esc(estado.atualizacao.por)+' · '+NOTAS.length+' notas carregadas no total.</p>' : ''}`;
}
function importarPara(origem){
  if(!podeEditar(estado.usuario)){ toast("Seu perfil não tem permissão para importar planilhas."); return; }
  estado.tipoImport = origem;
  $("#inputImport").click();
}

function mostrarMaiorRetencao(){
  const r = soRetidas();
  if(!r.length){ toast("Não há notas em retenção."); return; }
  const maior = r.reduce((a,b)=> b.diasRetida > a.diasRetida ? b : a);
  const g = gridEstado("ret");
  g.busca=""; g.filtros={}; g.periodos={}; g.sel = new Set([maior.nf]); g.selAnchor = maior.nf;
  render();
  toast("Maior retenção: NF "+maior.nf+" — "+maior.diasRetida+" dia(s) · "+maior.transp+" ("+maior.cliente+")");
  setTimeout(()=>{ const tr = document.querySelector("#conteudo tbody tr.sel"); if(tr && tr.scrollIntoView) tr.scrollIntoView({block:"center", behavior:"smooth"}); }, 60);
}

function paginaComprovantes(){
  const aba = estado.abaComp || "solicitar";
  const abas = `
    <div class="abas">
      <button class="aba-btn ${aba==="solicitar"?"ativa":""}" onclick="mudarAbaComp('solicitar')">Solicitação de comprovantes</button>
      <button class="aba-btn ${aba==="consultar"?"ativa":""}" onclick="mudarAbaComp('consultar')">Consulta de comprovantes</button>
    </div>`;

  if(aba==="solicitar"){
    const u = estado.usuario || {};
    return '<h2>Gestão de comprovantes de entrega</h2>'+abas+`
      <div class="painel" style="max-width:720px">
        <div class="form-grid">
          <div><label>Estabelecimento</label><select class="input" id="cEstab">${["1","9","10","20","40"].map(e=>'<option>'+e+'</option>').join("")}</select></div>
          <div><label>Nota Fiscal</label><input class="input" id="cNF" inputmode="numeric" maxlength="7" placeholder="Somente números" oninput="this.value=this.value.replace(/\D/g,'')" onblur="if(this.value)this.value=this.value.padStart(7,'0')"></div>
          <div><label>Data de emissão</label><input class="input" type="date" id="cEmissao"></div>
          <div><label>Transportadora</label><select class="input" id="cTransp">${TRANSPORTADORAS.map(t=>'<option>'+esc(t)+'</option>').join("")}</select></div>

  let historicoHTML = "";

      <tbody>${corpo}</tbody></table>
    </div>${historicoHTML}`;

function zerarDadosTeste(){
  if(estado.confirmarZerar){
    estado.confirmarZerar = false;
    ["pl_dados_v2","pl_dados","pl_edicoes","pl_import_meta","pl_disparo","pl_retornos"].forEach(k=>store.write(k, null));
    store.write("pl_zerado", true);   // marca que foi limpo (não recarrega a amostra)
    // limpa comprovantes/solicitações em memória
    estado.solicitacoes = [];
    estado.atualizacao = { data: fmt(HOJE), hora: "08:00", por: "sistema" };
    NOTAS = []; EDICOES = {};
    carregarNotas();      // recarrega vazio
    estado.grids = {};    // zera filtros/seleções
    registrarAuditoria("Limpou todas as tabelas (notas, edições e solicitações de comprovante)");
    toast("Todas as tabelas foram limpas. Pronto para testes.");
    render();
  } else {
    estado.confirmarZerar = true;
    render();
    toast("Clique novamente em Limpar para confirmar. Esta ação apaga todas as notas.");
  }
}
function addEmailTransp(){
  const nome = ($("#emailTranspNome").value||"").trim();

  if(!nome){ toast("Informe o nome da transportadora."); return; }
  if(!emailValido(mail)){ toast("Informe um e-mail válido."); return; }
  EMAILS_TRANSP[nome] = mail; salvarEmailsTransp();
  registrarAuditoria('Cadastrou e-mail de transportadora: "'+nome+'" → '+mail);
  toast("E-mail cadastrado para "+nome+"."); render();
}
// confirmação em duas etapas para exclusões em Configurações (mesmo padrão do "Limpar todas as tabelas")
const emConfirmacao = (chave) => estado.confirmarRemocao === chave;
function pedirConfirmacao(chave, executar){
  if(estado.confirmarRemocao === chave){
    estado.confirmarRemocao = null;
    executar();
  } else {
    estado.confirmarRemocao = chave;
    render();
    toast("Clique novamente para confirmar a remoção.");
  }
}
function removerEmailTransp(nome){

    toast('E-mail de "'+nome+'" removido.');
  });
}
function addTranspOculta(){

    } else {
      acoes = u.status==="pendente"
        ? '<button class="btn pequeno primario" onclick="aprovarUsuario('+i+')">Aprovar</button> '+
          '<button class="btn pequeno" onclick="recusarUsuario('+i+')">Recusar</button>'

                   : '<button class="btn pequeno" onclick="bloquearUsuario('+i+')">Revogar</button>')

            '<button class="btn pequeno" onclick="removerUsuario('+i+')">Remover</button>';
    }
    return `<tr>

      <td style="color:var(--accent)">${esc(u.email)}</td>
      <td>${admin?u.perfil:selPerfil}</td>

      <td style="white-space:normal;min-width:230px">${chips}</td>
      <td style="white-space:nowrap">${acoes}</td>
    </tr>`;
  }).join("");

  return `
    <h2>Usuários e acessos</h2>
    <p class="sub-texto">Aprove os cadastros pendentes, defina o perfil e libere as páginas que cada pessoa pode ver. Clique nos marcadores de página para conceder ou remover o acesso.</p>
    <div class="cards" style="margin-bottom:16px">
      ${cardHTML("Total de usuários", USUARIOS.length)}
      ${cardHTML("Aguardando liberação", pend, pend?"var(--amarelo)":null)}
      ${cardHTML("Ativos", USUARIOS.filter(u=>u.status==="aprovado").length,"var(--verde)")}
    </div>
    <div class="tabela-wrap" style="max-height:none">
      <table><thead><tr>${["Nome","E-mail","Perfil","Status","Último acesso","Páginas liberadas","Ações"].map(h=>"<th>"+h+"</th>").join("")}</tr></thead>
      <tbody>${linhas}</tbody></table>
    </div>`;
}

function aprovarUsuario(i){
  const u = USUARIOS[i];
  u.status = "aprovado";
  if(!ehAdmin(u) && (!Array.isArray(u.paginas) || !u.paginas.length)){
    const padrao = ACESSO_PADRAO[u.perfil];
    u.paginas = padrao === "ALL" ? "ALL" : (padrao ? padrao.slice() : ["operacional"]);
  }
  salvarUsuarios();
  registrarAuditoria("Aprovou acesso do usuário: "+u.email+" ("+u.perfil+")");
  toast("Acesso liberado para "+u.nome); render();
}
function recusarUsuario(i){
  const u = USUARIOS[i];
  if(!u){ return; }

  removerUsuarioConfirmado(i, u.email);
}
function removerUsuario(i){
  const u = USUARIOS[i];

  if(ehAdmin(u)){ toast("Não é possível remover uma conta de administrador."); return; }
  removerUsuarioConfirmado(i, u.email);
}
// confirmação in-app (não usa confirm() do navegador, que pode ser bloqueado)
function removerUsuarioConfirmado(i, email){

    USUARIOS.splice(i,1); salvarUsuarios();
    registrarAuditoria("Removeu usuário: "+email);

function cancelarRemover(){ estado.confirmarRemover = null; render(); }
function bloquearUsuario(i){

function mudarPerfil(i,v){

function alternarAcesso(i,chave){
  const u = USUARIOS[i];
  if(!Array.isArray(u.paginas)) u.paginas = [];

  u.paginas = u.paginas.includes(chave) ? u.paginas.filter(k=>k!==chave) : u.paginas.concat(chave);
  salvarUsuarios();
  registrarAuditoria((ligando?"Liberou":"Revogou")+" acesso a \""+chave+"\" para "+u.email);

function solicitarComprovante(){
  const v = (id)=>($( "#"+id )||{}).value || "";
  let nf = v("cNF").replace(/\D/g,"");           // só dígitos, mesmo que algo tenha escapado da sanitização do campo
  if(nf) nf = nf.padStart(7,"0");                // completa com zeros à esquerda até 7 dígitos
  const solic = v("cSolic"), email = v("cEmail");
  if(!nf){ toast("Informe a Nota Fiscal (somente números)."); return; }
  if(!solic){ toast("Informe o solicitante."); return; }
  if(!emailValido(email)){ toast("Informe um e-mail de solicitante válido."); return; }
  const jaExiste = estado.solicitacoes.some(s=>s.nf===nf);
  if(jaExiste && estado.confirmarNfDuplicada !== nf){
    estado.confirmarNfDuplicada = nf;
    toast('Já existe uma solicitação de comprovante para a NF '+nf+'. Clique em "Solicitar comprovante" novamente para confirmar mesmo assim.');
    return;
  }
  estado.confirmarNfDuplicada = null;
  const protocolo = "SC-2026-"+String(estado.solicitacoes.length+1).padStart(4,"0");
  const agora = new Date();
  const emissao = v("cEmissao") ? v("cEmissao").split("-").reverse().join("/") : "";
  const prazoD = addDiasUteis(agora, 5);   // 5 dias úteis a partir da solicitação, sem contar o dia dela
  estado.solicitacoes.unshift({
    protocolo, estab:v("cEstab"), nf, emissao, transp:v("cTransp"), solicitante:solic, email, motivo:v("cMotivo"),
    obs:"O prazo de retorno é de 5 dias úteis.", status:"Pendente", data:fmt(agora), prazo:fmt(prazoD), arquivo:null,
    historico:[{acao:"Criação da solicitação", usuario:solic||"operador", quando:fmt(agora)+" "+agora.toLocaleTimeString("pt-BR")}],
  });
  notificar("Solicitação "+protocolo+" criada");
  notificarOperadorComprovante(protocolo, nf);   // notifica o Operador
  registrarAuditoria("Solicitou comprovante "+protocolo+" (NF "+nf+")");
  estado.abaComp = "consultar";
  render();
}

function anexarPara(protocolo){
  if(estado.usuario && estado.usuario.perfil==="Consulta"){ toast("Seu perfil não pode anexar comprovantes."); return; }
  estado.alvoUpload = protocolo;
  $("#inputArquivo").click();
}
$("#inputArquivo").addEventListener("change", function(e){
  const f = e.target.files && e.target.files[0];
  if(!f || !estado.alvoUpload) return;
  if(!/\.(pdf|jpg|jpeg|png|docx|xlsx)$/i.test(f.name)){ toast("Formato não permitido. Use PDF, JPG, PNG, DOCX ou XLSX."); e.target.value=""; return; }
  const LIMITE_MB = 8;
  if(f.size > LIMITE_MB*1024*1024){ toast("Arquivo muito grande (máx. "+LIMITE_MB+"MB)."); e.target.value=""; return; }
  const alvo = estado.alvoUpload;
  if(alvo === "__avulso__"){
    toast("Arquivo \""+f.name+"\" recebido com sucesso.");
    e.target.value = ""; estado.alvoUpload = null; return;
  }
  const reader = new FileReader();
  reader.onload = function(ev){
    const agora = new Date(), hora = fmt(agora)+" "+agora.toLocaleTimeString("pt-BR");
    const s = estado.solicitacoes.find(x=>x.protocolo===alvo);
    if(s){
      s.arquivo = f.name; s.arquivoData = ev.target.result; s.arquivoTipo = f.type; s.status = "Concluído";
      s.historico.push({acao:"Upload do comprovante ("+f.name+")", usuario:"operador", quando:hora});
      s.historico.push({acao:"Conclusão da solicitação", usuario:"sistema", quando:hora});
      notificar("Comprovante recebido — "+s.protocolo);
      registrarAuditoria("Anexou comprovante em "+s.protocolo+" (\""+f.name+"\")");
    }
    estado.alvoUpload = null;
    render();
  };
  reader.onerror = function(){
    toast("Não foi possível ler o arquivo. Tente novamente.");
    estado.alvoUpload = null;
  };
  reader.readAsDataURL(f);
  e.target.value = "";
});
function visualizarComprovante(protocolo){
  const s = estado.solicitacoes.find(x=>x.protocolo===protocolo);
  if(!s || !s.arquivoData){ toast("Arquivo não disponível para visualização (anexado antes desta atualização, ou sessão anterior)."); return; }
  const win = window.open("", "_blank");
  if(!win){ toast("O navegador bloqueou a nova aba. Permita pop-ups para visualizar."); return; }
  if(/^image\//.test(s.arquivoTipo||"")){
    win.document.write('<title>'+esc(s.arquivo)+'</title><body style="margin:0;background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+s.arquivoData+'" style="max-width:100%;max-height:100vh"></body>');
  } else if(s.arquivoTipo==="application/pdf"){
    win.document.write('<title>'+esc(s.arquivo)+'</title><body style="margin:0"><embed src="'+s.arquivoData+'" type="application/pdf" style="width:100vw;height:100vh"></body>');
  } else {
    win.location.href = s.arquivoData;   // docx/xlsx: deixa o navegador decidir (baixar ou abrir no app associado)
  }
}
function baixarComprovante(protocolo){
  const s = estado.solicitacoes.find(x=>x.protocolo===protocolo);
  if(!s || !s.arquivoData){ toast("Arquivo não disponível para download (anexado antes desta atualização, ou sessão anterior)."); return; }
