<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Logístico</title>
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --thead:#fafbfc; --border:#e1e4e8; --row-border:#eef0f2;
  --row-alt:#fbfcfd; --text:#201f1e; --sub:#6b6f76; --accent:#0f6cbd; --accent-soft:rgba(15,108,189,.09);
  --sidebar:#ffffff; --shadow:0 1px 2px rgba(0,0,0,.06);
  --verde:#107c10; --verde-bg:rgba(16,124,16,.12);
  --amarelo:#a68b00; --amarelo-bg:rgba(234,179,8,.15);
  --laranja:#c2570b; --laranja-bg:rgba(234,88,12,.14);
  --vermelho:#c50f1f; --vermelho-bg:rgba(197,15,31,.12);
}
[data-theme=dark]{
  --bg:#1b1a19; --card:#252423; --thead:#2b2a29; --border:#3b3a39; --row-border:#323130;
  --row-alt:#2a2928; --text:#f3f2f1; --sub:#a19f9d; --accent:#4ea1e0; --accent-soft:rgba(78,161,224,.15);
  --sidebar:#201f1e; --shadow:0 1px 2px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
button{font-family:inherit}
h2{font-size:18px;margin:0 0 14px}
.hidden{display:none!important}

/* ---------- Login ---------- */
#telaLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f6cbd 0%,#123a63 100%)}
.login-card{background:#fff;border-radius:14px;padding:34px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35);color:#201f1e}
.login-card .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.login-card .sub{font-size:12.5px;color:#6b6f76;margin:4px 0 22px}
.login-card label{font-size:12px;color:#6b6f76;display:block;margin-bottom:5px}
.login-card input[type=text],.login-card input[type=password]{width:100%;padding:9px 11px;border-radius:7px;border:1px solid #d5d9de;font-size:13px;margin-bottom:14px}
.login-card .lembrar{display:flex;gap:7px;align-items:center;font-size:12.5px;color:#444;margin-bottom:16px}
.login-card .entrar{width:100%;background:#0f6cbd;color:#fff;border:none;border-radius:8px;padding:10px 0;font-size:14px;font-weight:600;cursor:pointer}
.login-card .entrar:hover{background:#0d5ea6}
.login-card .esqueci{display:block;text-align:center;margin-top:12px;font-size:12.5px;color:#0f6cbd;text-decoration:none}
.auth-abas{display:flex;gap:6px;margin-bottom:18px;background:#eef1f5;border-radius:9px;padding:4px}
.auth-aba{flex:1;border:none;background:transparent;padding:8px 0;border-radius:7px;font-size:13px;font-weight:600;color:#6b6f76;cursor:pointer}
.auth-aba.ativa{background:#fff;color:#0f6cbd;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:8px;padding:9px 0;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:10px}
.google-btn:hover{background:#f7f8fa}
.aviso-reg{font-size:12px;color:#6b6f76;background:#eef4fb;border:1px solid #d6e6f7;border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.5}
/* gestão de acessos */
.tag-status{font-weight:600;font-size:11px;padding:2px 9px;border-radius:10px;display:inline-block}
.acesso-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);cursor:pointer;user-select:none;background:var(--card);color:var(--sub)}
.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
/* ===== navegação superior moderna (categorias + dropdowns) ===== */
.topnav{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--shadow)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;border:none;background:transparent;color:var(--text);font-size:13px;font-weight:600;padding:9px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.nav-btn:hover{background:var(--accent-soft);color:var(--accent)}
.nav-btn.ativa{background:var(--accent);color:#fff}
.nav-btn.ativa:hover{background:var(--accent);color:#fff}
.nav-ic{flex-shrink:0}
.chev{transition:transform .2s ease}
.nav-drop{position:relative}
.nav-drop:hover .chev,.nav-drop.aberto .chev{transform:rotate(180deg)}
.nav-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:230px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;box-shadow:0 12px 32px rgba(0,0,0,.16);display:flex;flex-direction:column;gap:4px;z-index:45;
  opacity:0;visibility:hidden;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease,visibility .18s}
.nav-drop:hover>.nav-menu,.nav-drop.aberto>.nav-menu{opacity:1;visibility:visible;transform:translateY(0)}
.nav-menu-item{text-align:left;border:none;background:transparent;color:var(--text);font-size:13px;font-weight:500;padding:10px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .13s,color .13s}
.nav-menu-item:hover{background:var(--accent-soft);color:var(--accent)}
.nav-menu-item.ativa{background:var(--accent);color:#fff;font-weight:600}
.nav-menu-item.ativa:hover{background:var(--accent);color:#fff}
.tabs-prev{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tab-prev{border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;font-weight:600;padding:6px 11px;border-radius:16px;cursor:pointer;white-space:nowrap}
.tab-prev:hover{border-color:var(--accent);color:var(--accent)}
.tab-prev.ativa{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.dropzone{text-align:center;padding:38px 18px;border:2px dashed var(--border);cursor:pointer;max-width:560px}
.dropzone:hover{border-color:var(--accent);color:var(--accent)}
/* toggle Reduzido/Total */
.toggle-red{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);user-select:none}
.toggle-red .tg-on{color:var(--accent)}
.tg-track{width:34px;height:18px;border-radius:10px;background:var(--accent);position:relative;flex-shrink:0}
.tg-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .18s ease}
.tg-knob.dir{left:18px}

/* ---------- Layout ---------- */
#app{min-height:100vh}
.brand-top{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;white-space:nowrap;margin-right:6px}
.brand-top svg{color:var(--accent)}
.atualiz-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.atualiz-info{font-size:11.5px;color:var(--sub);line-height:1.35}
.atualiz-info b{color:var(--text);font-weight:600}
.atualiz-info .pub{color:var(--accent)}
/* indicador discreto de usuários online */
.online-chip{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:14px;padding:4px 10px;cursor:pointer;color:var(--sub);font-size:12px;font-weight:600}
.online-chip:hover{border-color:var(--accent);color:var(--accent)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.online-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--row-border)}
.online-item .online-dot{box-shadow:none}
.online-item .quando{margin-left:auto;color:var(--sub);font-size:11px}
main{min-width:0}
header{display:flex;align-items:center;gap:12px;padding:12px 22px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;flex-wrap:wrap}
.conteudo{padding:22px}
.sub-texto{color:var(--sub);font-size:12.5px;margin:-6px 0 14px}

/* ---------- Controles ---------- */
.input,select.input{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12.5px;outline:none}
.input:focus{border-color:var(--accent)}
.busca-wrap{position:relative;flex:0 1 340px}
.busca-wrap svg{position:absolute;left:10px;top:9px;color:var(--sub)}
.busca-wrap input{padding-left:32px;width:100%;background:var(--bg)}
.btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primario{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primario:hover{filter:brightness(.93);color:#fff}
.btn.pequeno{padding:5px 10px}
.icone-btn{background:none;border:none;cursor:pointer;color:var(--text);padding:6px;position:relative;border-radius:8px}
.icone-btn:hover{background:var(--accent-soft)}
.tema-btn{border:1px solid var(--border)}

/* ---------- Cards ---------- */
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.card{text-align:left;cursor:pointer;border:1px solid var(--border);background:var(--card);border-radius:10px;padding:8px 14px;min-width:108px;flex:0 1 auto;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
.card:hover{border-color:var(--accent)}
.card.ativo{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card .rotulo{font-size:11.5px;color:var(--sub);margin-bottom:2px;white-space:nowrap}
.card .valor{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- Grid ---------- */
.grid-barra{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.grid-barra .espaco{flex:1}
.tabela-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--card)}
table{border-collapse:separate;border-spacing:0;width:100%}
th{position:sticky;top:0;z-index:2;background:var(--thead);color:var(--sub);font-size:11.5px;font-weight:600;text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th.fixa{z-index:3;background:var(--thead)}
/* larguras EXATAS para as duas colunas congeladas ficarem coladas, sem vão */
th.fixa.c1,td.fixa.c1{left:0;width:64px;min-width:64px;max-width:64px;box-sizing:border-box}
th.fixa.c2,td.fixa.c2{left:64px;width:104px;min-width:104px;max-width:104px;box-sizing:border-box;border-right:2px solid var(--border)}
td.fixa{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
th .seta{color:var(--accent);margin-left:4px}
td{padding:9px 12px;border-bottom:1px solid var(--row-border);font-size:12.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
td.fixa{position:sticky;background:var(--card);z-index:1}
tbody tr:nth-child(even){background:var(--row-alt)}
tbody tr:nth-child(even) td.fixa{background:var(--row-alt)}
tbody tr:hover td{background:var(--accent-soft)}
tbody tr:hover td.fixa{background:color-mix(in srgb, var(--accent) 9%, var(--card))}
/* fundos sólidos nas colunas fixas para o texto não sobrepor ao rolar */
tbody tr.linha-m3000 td.fixa{background:color-mix(in srgb, #ef4444 11%, var(--card))}
tbody tr.linha-liberado td.fixa{background:color-mix(in srgb, #22c55e 12%, var(--card))}
tbody tr.linha-agenda td.fixa{background:color-mix(in srgb, #3b82f6 11%, var(--card))}
tbody tr.linha-realca td.fixa{background:color-mix(in srgb, #eab308 12%, var(--card))}
.nf-link{color:var(--accent);font-weight:600;cursor:pointer}
.vazio{color:var(--sub)}
.paginacao{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12.5px;color:var(--sub)}
.paginacao .espaco{flex:1}
/* cabeçalho clicável + funil */
th{cursor:pointer}
th .th-lbl{margin-right:2px}
th .seta{color:var(--accent);font-size:9px;margin:0 2px}
th .col-funil{color:var(--sub);font-size:9px;opacity:.55}
th .col-funil.ativa{color:var(--accent);opacity:1}
th:hover .col-funil{opacity:1}
/* popup filtro estilo Excel */
.fl-overlay{position:fixed;inset:0;z-index:55}
.fl-pop{position:fixed;z-index:56;width:270px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.22);padding:6px;display:flex;flex-direction:column;gap:2px;animation:surgir .14s ease;overflow:hidden}
.fl-opt{display:flex;align-items:center;gap:8px;text-align:left;border:none;background:transparent;color:var(--text);font-size:12.5px;padding:8px 10px;border-radius:7px;cursor:pointer;width:100%;flex-shrink:0}
.fl-opt:hover{background:var(--accent-soft);color:var(--accent)}
.fl-opt.disabled{color:var(--sub);opacity:.5;cursor:default}
.fl-opt.disabled:hover{background:transparent;color:var(--sub)}
.fl-sep{height:1px;background:var(--border);margin:3px 2px;flex-shrink:0}
.fl-busca{padding:2px 4px 4px;flex-shrink:0}
.fl-busca .input{width:100%;box-sizing:border-box}
.fl-lista{flex:1 1 auto;min-height:110px;max-height:260px;overflow-y:auto;padding:2px;overscroll-behavior:contain}
.fl-item{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 8px;border-radius:6px;cursor:pointer}
.fl-item:hover{background:var(--accent-soft)}
.fl-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl-todos{font-weight:600;border-bottom:1px solid var(--border);border-radius:0;margin:2px 2px 0;flex-shrink:0}
.fl-vazio{padding:10px;color:var(--sub);font-size:12px;text-align:center}
.fl-acoes{display:flex;gap:6px;justify-content:flex-end;padding:6px 4px 2px;border-top:1px solid var(--border);margin-top:2px;flex-shrink:0}

/* ---------- Badges ---------- */
.badge{font-weight:600;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;display:inline-block}
.b-verde{color:var(--verde);background:var(--verde-bg)}
.b-amarelo{color:var(--amarelo);background:var(--amarelo-bg)}
.b-laranja{color:var(--laranja);background:var(--laranja-bg)}
.b-vermelho{color:var(--vermelho);background:var(--vermelho-bg)}
.b-azul{color:var(--accent);background:var(--accent-soft)}
.legenda{display:flex;gap:14px;align-items:center;margin-bottom:10px;font-size:11.5px;color:var(--sub);flex-wrap:wrap}
/* legenda de cores das linhas */
.legenda-cores{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--text)}
.legenda-cores .lc-titulo{font-weight:600;color:var(--sub)}
.lc-item{display:flex;align-items:center;gap:6px}
.lc-dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.lc-dot.lc-realca{background:#eab308}
.lc-dot.lc-m3000{background:#ef4444}
.lc-dot.lc-agenda{background:#3b82f6}
.lc-dot.lc-liberado{background:#22c55e}
/* tint das linhas conforme legenda */
tbody tr.linha-realca td{background:rgba(234,179,8,.12)}
tbody tr.linha-m3000 td{background:rgba(239,68,68,.11)}
tbody tr.linha-agenda td{background:rgba(59,130,246,.11)}
tbody tr.linha-liberado td{background:rgba(34,197,94,.12)}
/* seleção de linha */
tbody tr{cursor:pointer}
tbody tr.sel td{background:var(--accent)!important;color:#fff}
tbody tr.sel td .nf-link,tbody tr.sel td .badge{color:#fff!important}
tbody tr.sel td.fixa{background:var(--accent)!important}
/* período no popup de filtro */
.fl-periodo{padding:4px 6px 6px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.fl-per-tit{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em}
.fl-periodo label{display:flex;flex-direction:column;font-size:12px;color:var(--sub);gap:3px}
.fl-periodo .input{width:100%;box-sizing:border-box}
.fl-limpar-per{align-self:flex-start;border:none;background:transparent;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;padding:2px 0}
/* painéis do resumo (infográfico) */
.resumo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.painel-info{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--card)}
.painel-info.azul{background:linear-gradient(180deg,rgba(15,108,189,.06),transparent 60%)}
.painel-info.verde{background:linear-gradient(180deg,rgba(34,197,94,.07),transparent 60%)}
.pi-tit{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;margin-bottom:10px}
.pi-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.pi-dot.azul{background:var(--accent)}
.pi-dot.verde{background:#22c55e}
.tbl-info{width:100%;border-collapse:collapse}
.tbl-info th{position:static;background:transparent;border-bottom:1px solid var(--border);color:var(--sub);font-size:11.5px;padding:6px 8px;cursor:default}
.tbl-info td{padding:7px 8px;border-bottom:1px solid var(--row-border);font-size:12.5px}
.tbl-info td.num,.tbl-info th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl-info tr.total td{font-weight:700;border-top:2px solid var(--border);border-bottom:none}
.tbl-scroll{max-height:352px;overflow-y:auto;overscroll-behavior:contain;border-radius:6px}
.tbl-scroll .tbl-info th{position:sticky;top:0;background:var(--card);z-index:1}
.tbl-scroll::-webkit-scrollbar{width:8px}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
.tbl-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.tbl-info tr.filtro-row td{padding:4px 8px 8px}
.tbl-info tr.filtro-row .input{padding:4px 8px;font-size:12px;width:100%;box-sizing:border-box}
.tbl-info tbody tr{cursor:default}
.tbl-info tbody tr:hover td{background:var(--accent-soft)}
@media(max-width:820px){.resumo-grid{grid-template-columns:1fr}}
/* células editáveis */
.cel-edit{padding:4px 7px;font-size:12px;min-width:120px}
.cel-edit.obs{min-width:190px}
tbody tr.sel .cel-edit{background:#fff;color:#111}
/* filtros do resumo */
.resumo-filtros{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin:2px 0 16px}
.resumo-filtros label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);font-weight:600}
.resumo-filtros select{min-width:170px}
/* infográfico de barras */
.ig{display:flex;flex-direction:column;gap:7px}
.ig-row{display:flex;align-items:center;gap:10px}
.ig-nome{width:150px;font-size:12px;text-align:right;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ig-track{flex:1;background:var(--accent-soft);border-radius:6px;height:18px;overflow:hidden}
.ig-bar{height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease}
.ig-val{width:40px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- Dropdowns ---------- */
.drop{position:relative}
.drop-menu{position:absolute;right:0;top:34px;z-index:20;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:260px;overflow:auto;width:210px}
.drop-menu label{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:5px 6px;cursor:pointer;border-radius:5px}
.drop-menu label:hover{background:var(--accent-soft)}
.notif-menu{position:absolute;right:0;top:38px;width:300px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:50;overflow:hidden}
.notif-menu .titulo{padding:10px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border)}
.notif-item{padding:10px 14px;font-size:12.5px;border-bottom:1px solid var(--row-border)}
.notif-item .quando{color:var(--sub);font-size:11px;margin-top:2px}
.notif-badge{position:absolute;top:2px;right:0;background:#c50f1f;color:#fff;font-size:9.5px;font-weight:700;border-radius:8px;padding:1px 5px}

/* ---------- Painéis / formulário ---------- */
.painel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.form-grid label,.campo label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px}
.form-grid .input,.form-grid select{width:100%}
textarea.input{width:100%;resize:vertical}
.abas{display:flex;gap:8px;margin-bottom:14px}
.aba-btn{cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--sub);font-weight:600;font-size:13.5px;padding:6px 4px}
.aba-btn.ativa{color:var(--accent);border-bottom-color:var(--accent)}

/* ---------- Modal 360 ---------- */
#modal360{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
.modal-caixa{background:var(--card);color:var(--text);border-radius:12px;border:1px solid var(--border);width:min(560px,92vw);padding:20px;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:surgir .18s ease}
@keyframes surgir{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.modal-caixa .topo{display:flex;align-items:center;margin-bottom:12px;font-weight:700;font-size:15px}
.linha360{display:flex;gap:12px;border-bottom:1px solid var(--row-border);padding:8px 0;font-size:13px}
.linha360 .r{width:130px;color:var(--sub);font-size:12px;flex-shrink:0}

/* ---------- Toast ---------- */
#toasts{position:fixed;bottom:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 16px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.18);animation:surgir .2s ease}

/* ---------- Responsivo ---------- */
@media(max-width:860px){
  header{flex-wrap:wrap}
  .topnav{overflow-x:auto}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

// edições do usuário (Entregue / Observação) persistidas por NF
let EDICOES = {};

// códigos: 1 = entregue · 91 = programada · 36 = liberado · M3000 = pendência financeira
// retenção: notas com Cod 26 ou 92 ficam APENAS na aba Retenção
const CODS_RETENCAO = new Set(["26","92"]);
const dBR = (str) => { const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(str||""); return m? new Date(+m[3],+m[2]-1,+m[1]) : null; };

function derivaNota(n){
  const o = Object.assign({}, n);
  o.nf = String(o.nf);
  const ed = EDICOES[o.nf] || {};
  o.entregue = ed.entregue || "";
  o.obs = ed.obs || "";
  const cod = String(o.cod||"").trim().toUpperCase();
  // retenção (regra: Cod 26 ou 92 → apenas Retenção; se depois vier outra ocorrência,
  // como 36, o Cod muda e a nota volta ao seu monitoramento)
  o.ehRetida = CODS_RETENCAO.has(cod);
  o.temM3000 = cod === "M3000";
  o.dtOcorD = dBR(o.dtOcor);
  o.dataLib = cod === "36" ? o.dtOcorD : null;
  o.diasRetida = (o.ehRetida && o.dtOcorD) ? diffDias(o.dtOcorD, o.dataLib || HOJE) : 0;
  o.diferenca = (o.dtOcorD && o.dataLib) ? diasUteis(o.dtOcorD, o.dataLib) : null;
  o.prev1D = dBR(o.prev1);
  o.prevD = dBR(o.prev);
  o.novaPrev = (o.prev1D && o.diferenca!=null) ? addDias(o.prev1D, o.diferenca) : null;
  o.foiEntregue = !!o.entr || cod === "1" || !!o.entregue;
  o.semPrevisao = !o.prev && !o.prev1;
  // classificação nos monitoramentos:
  // Tipo Agenda preenchido → c/ Agenda (Redespa 1 preenchido = Redespacho + Agenda; vazio = Transportadora + Agenda)
  // Tipo Agenda vazio e Transportadora preenchida → Redespa 1 preenchido = Redespacho; vazio = Transportadora
  const temRedespacho = !!String(o.redespa1||"").trim();
  const temAgenda = !!String(o.tipoAgenda||"").trim();
  if(temAgenda) o.cat = temRedespacho ? "agend_Redespacho" : "agend_Transportadora";
  else if(String(o.transp||"").trim()) o.cat = temRedespacho ? "mon_Redespacho" : "mon_Transportadora";
  else o.cat = "";
  return o;
}

let NOTAS = [];
function carregarNotas(){
  EDICOES = store.read("pl_edicoes", {}) || {};
  const salvas = store.read("pl_dados", null);
  const base = (salvas && salvas.length) ? salvas : AMOSTRA_INICIAL;
  NOTAS = base.map(derivaNota);
}
function salvarEdicao(nf, campo, valor){
  nf = String(nf);
  if(!EDICOES[nf]) EDICOES[nf] = {};
  EDICOES[nf][campo] = valor;
  store.write("pl_edicoes", EDICOES);
  const n = NOTAS.find(x=>x.nf===nf);
  if(n){ n[campo] = valor; Object.assign(n, derivaNota(n)); }
}

/* ---------- exportação ---------- */
function baixarCSV(nome, cabecalhos, linhas){
  const csv = [cabecalhos.join(";")].concat(linhas.map(l=>l.join(";"))).join("\n");
  const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nome;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------- Data Grid genérica ---------- */
const COLS_REDUZIDO = ["repres","usuario","valor","cod","ocorrencia","descricao","dtOcor","transport2","vencto","logEmail"];
function gridEstado(id){
  if(!estado.grids[id]) estado.grids[id] = {sort:null, busca:"", ocultas:[], menuCol:false, filtros:{}, periodos:{}, filtroCol:null, fBusca:"", fTemp:null, perTemp:null, popX:0, popY:0, sel:new Set(), selAnchor:null, reduzido:true};
  return estado.grids[id];
}
function alternarReduzido(id){ const g = gridEstado(id); g.reduzido = !g.reduzido; render(); }
const valorCelula = (c, r) => { const v = c.raw ? c.raw(r) : (r[c.key] ?? ""); return (v===null||v===undefined) ? "" : String(v); };

// valores distintos da coluna (a partir de todas as linhas), ordenados
function valoresDistintos(c, rows){
  const set = new Set();
  rows.forEach(r => set.add(valorCelula(c, r) || "(vazias)"));
  const arr = [...set];
  const todosNum = arr.every(v => v==="(vazias)" || !isNaN(parseFloat(v.replace(/\./g,"").replace(",","."))));
  arr.sort((a,b)=>{
    if(a==="(vazias)") return 1; if(b==="(vazias)") return -1;
    if(todosNum){ return parseFloat(a.replace(/\./g,"").replace(",","."))-parseFloat(b.replace(/\./g,"").replace(",",".")); }
    return a.localeCompare(b,"pt-BR");
  });
  return arr;
}

function renderGrid(id, cols, rows, nomeExport){
  const g = gridEstado(id);
  window["__cols_"+id] = cols;   // usados pelos helpers de filtro
  window["__rows_"+id] = rows;
  const visiveis = cols.filter(c => !g.ocultas.includes(c.key) && !(g.reduzido && COLS_REDUZIDO.includes(c.key)));

  let dados = rows;
  // filtros por coluna (estilo Excel)
  Object.keys(g.filtros).forEach(k=>{
    const permitidos = g.filtros[k];
    if(!permitidos) return;
    const c = cols.find(x=>x.key===k); if(!c) return;
    const set = new Set(permitidos);
    dados = dados.filter(r => set.has(valorCelula(c,r) || "(vazias)"));
  });
  // filtros de período (De/Até) em colunas de data
  Object.keys(g.periodos).forEach(k=>{
    const per = g.periodos[k]; if(!per || (!per.de && !per.ate)) return;
    const c = cols.find(x=>x.key===k); if(!c) return;
    const de = per.de ? new Date(per.de) : null, ate = per.ate ? new Date(per.ate) : null;
    dados = dados.filter(r=>{
      const s = valorCelula(c,r);
      const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
      if(!m) return false;
      const dt = new Date(+m[3], +m[2]-1, +m[1]);
      if(de && dt < de) return false;
      if(ate && dt > ate) return false;
      return true;
    });
  });
  // busca livre
  if(g.busca){
    const q = g.busca.toLowerCase();
    dados = dados.filter(r => cols.some(c => valorCelula(c,r).toLowerCase().includes(q)));
  }
  // ordenação
  if(g.sort){
    const c = cols.find(x => x.key===g.sort.key);
    dados = dados.slice().sort((a,b)=>{
      const va = c.sortVal ? c.sortVal(a) : (a[c.key] ?? ""), vb = c.sortVal ? c.sortVal(b) : (b[c.key] ?? "");
      return (va>vb?1:va<vb?-1:0)*(g.sort.dir==="asc"?1:-1);
    });
  }
  const pagina = dados; // sem paginação: todos numa página
  window["__ordem_"+id] = pagina.map(r=>r.nf);   // ordem atual (p/ seleção com Shift)

  window["__export_"+id] = () => baixarCSV(nomeExport+".csv",
    visiveis.map(c=>c.label),
    dados.map(r=>visiveis.map(c=>c.raw ? c.raw(r) : (r[c.key] ?? ""))));

  const clsFixa = (i)=> i===0 ? "fixa c1" : i===1 ? "fixa c2" : "";
  const cabecalho = visiveis.map((c,i)=>{
    const setaOrd = g.sort && g.sort.key===c.key ? '<span class="seta">'+(g.sort.dir==="asc"?"▲":"▼")+'</span>' : "";
    const filtrada = !!g.filtros[c.key] || !!(g.periodos[c.key] && (g.periodos[c.key].de||g.periodos[c.key].ate));
    const funil = '<span class="col-funil'+(filtrada?" ativa":"")+'">▾</span>';
    return '<th class="'+clsFixa(i)+'" onclick="abrirFiltro(event,\''+id+'\',\''+c.key+'\')">'
      + '<span class="th-lbl">'+esc(c.label)+'</span>'+setaOrd+funil+'</th>';
  }).join("");

  const corpo = pagina.length ? pagina.map(r =>{
    const nf = r.nf;
    const clsCor = corLinha(r);
    const selCls = (nf && g.sel.has(nf)) ? " sel" : "";
    const onclick = nf ? ' onclick="selecionarLinha(event,\''+id+'\',\''+nf+'\')"' : "";
    return '<tr class="'+clsCor+selCls+'"'+onclick+'>'+visiveis.map((c,i)=>{
      const conteudo = c.html ? c.html(r) : esc(r[c.key] ?? "—");
      return '<td class="'+clsFixa(i)+'">'+conteudo+"</td>";
    }).join("")+"</tr>";
  }).join("") : '<tr><td colspan="'+visiveis.length+'"><span class="vazio">Nenhum registro encontrado para o filtro aplicado.</span></td></tr>';

  const menuColunas = g.menuCol ? '<div class="drop-menu">'+cols.map(c=>
    '<label><input type="checkbox" '+(g.ocultas.includes(c.key)?"":"checked")+' onchange="alternarColuna(\''+id+'\',\''+c.key+'\')"> '+esc(c.label)+'</label>'
  ).join("")+"</div>" : "";

  // popup de filtro estilo Excel
  let popup = "";
  if(g.filtroCol){
    const c = cols.find(x=>x.key===g.filtroCol);
    const ehData = c.tipo === "data";
    const distintos = valoresDistintos(c, rows);
    if(!(g.fTemp instanceof Set)) g.fTemp = new Set(distintos); // inicia com tudo selecionado
    const sel = g.fTemp;
    const q = (g.fBusca||"").toLowerCase();
    const listaVis = distintos.filter(v => v.toLowerCase().includes(q));
    const todosMarcados = listaVis.length>0 && listaVis.every(v=>sel.has(v));
    const temFiltro = !!g.filtros[g.filtroCol] || !!(g.periodos[g.filtroCol] && (g.periodos[g.filtroCol].de||g.periodos[g.filtroCol].ate));
    const itens = listaVis.map(v=>
      '<label class="fl-item"><input type="checkbox" '+(sel.has(v)?"checked":"")+' onchange="filtroToggle(\''+id+'\',this.getAttribute(\'data-v\'))" data-v="'+esc(v)+'">'
      + '<span>'+esc(v)+'</span></label>').join("") || '<div class="fl-vazio">Nenhum valor</div>';

    // seção de período (De/Até) para colunas de data
    const per = g.perTemp || {de:"", ate:""};
    const secaoPeriodo = ehData ? (
      '<div class="fl-periodo">'
      + '<div class="fl-per-tit">Período</div>'
      + '<label>De<input class="input" type="date" value="'+esc(per.de||"")+'" onchange="periodoTemp(\''+id+'\',\'de\',this.value)"></label>'
      + '<label>Até<input class="input" type="date" value="'+esc(per.ate||"")+'" onchange="periodoTemp(\''+id+'\',\'ate\',this.value)"></label>'
      + '<button class="fl-limpar-per" onclick="limparPeriodoTemp(\''+id+'\')">Limpar período</button>'
      + '</div><div class="fl-sep"></div>'
    ) : "";

    popup =
      '<div class="fl-overlay" onclick="fecharFiltro(\''+id+'\')"></div>'
      + '<div class="fl-pop" style="left:'+g.popX+'px;top:'+g.popY+'px;max-height:calc(100vh - '+(g.popY+14)+'px)" onclick="event.stopPropagation()">'
      +   '<button class="fl-opt" onclick="ordenarCol(\''+id+'\',\''+g.filtroCol+'\',\'asc\')"><span>↑</span> Classificar do Menor para o Maior</button>'
      +   '<button class="fl-opt" onclick="ordenarCol(\''+id+'\',\''+g.filtroCol+'\',\'desc\')"><span>↓</span> Classificar do Maior para o Menor</button>'
      +   '<div class="fl-sep"></div>'
      +   '<button class="fl-opt '+(temFiltro?"":"disabled")+'" '+(temFiltro?'onclick="limparFiltroCol(\''+id+'\',\''+g.filtroCol+'\')"':"disabled")+'>✕ Limpar Filtro de "'+esc(c.label)+'"</button>'
      +   '<div class="fl-sep"></div>'
      +   secaoPeriodo
      +   '<div class="fl-busca"><input class="input" placeholder="Pesquisar" value="'+esc(g.fBusca||"")+'" oninput="filtroBusca(\''+id+'\',this.value)"></div>'
      +   '<label class="fl-item fl-todos"><input type="checkbox" '+(todosMarcados?"checked":"")+' onchange="filtroTodos(\''+id+'\')"><span>(Selecionar Tudo)</span></label>'
      +   '<div class="fl-lista">'+itens+'</div>'
      +   '<div class="fl-acoes"><button class="btn primario pequeno" onclick="aplicarFiltro(\''+id+'\')">OK</button>'
      +     '<button class="btn pequeno" onclick="fecharFiltro(\''+id+'\')">Cancelar</button></div>'
      + '</div>';
  }

  const qtdSel = g.sel.size;
  const barraSel = qtdSel ? '<span style="font-size:12px;color:var(--accent);font-weight:600">'+qtdSel+' selecionada(s)</span>'
    + '<button class="btn pequeno" onclick="limparSelecao(\''+id+'\')">Limpar seleção</button>' : "";

  return `
  <div class="grid-barra">
    <div class="busca-wrap" style="flex:0 1 230px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35"/></svg>
      <input class="input" placeholder="Pesquisar na tabela…" value="${esc(g.busca)}" oninput="buscarGrid('${id}', this.value)">
    </div>

/* ---- filtro estilo Excel ---- */
function abrirFiltro(ev, id, colKey){
  ev.stopPropagation();
  const g = gridEstado(id);
  g.filtroCol = colKey;
  g.fBusca = "";
  // seleção temporária: parte do filtro salvo (se houver) ou de "tudo" (materializado no render)
  g.fTemp = g.filtros[colKey] ? new Set(g.filtros[colKey]) : null;
  g.perTemp = g.periodos[colKey] ? {de:g.periodos[colKey].de||"", ate:g.periodos[colKey].ate||""} : {de:"", ate:""};
  // posiciona o popup abaixo do cabeçalho clicado
  const th = ev.currentTarget.getBoundingClientRect();
  const larguraPop = 260, margem = 8;
  let x = th.left; if(x + larguraPop > window.innerWidth - margem) x = window.innerWidth - larguraPop - margem;
  g.popX = Math.max(margem, x);
  g.popY = th.bottom + 4;
  // garante espaço vertical suficiente (colunas de data têm a seção Período e precisam de mais)
  const ehData = (window["__cols_"+id]||[]).some(c=>c.key===colKey && c.tipo==="data");
  const alturaDesejada = Math.min(ehData ? 620 : 470, window.innerHeight - 2*margem);
  if(window.innerHeight - g.popY < alturaDesejada) g.popY = Math.max(margem, window.innerHeight - alturaDesejada);
  render();
}
function ordenarCol(id, key, dir){
  const g = gridEstado(id); g.sort = {key, dir}; g.filtroCol = null; g.fTemp = null; render();
}
function filtroToggle(id, val){
  const g = gridEstado(id);
  if(!(g.fTemp instanceof Set)) return;
  if(g.fTemp.has(val)) g.fTemp.delete(val); else g.fTemp.add(val);
  render();
}
function filtroBusca(id, texto){
  const g = gridEstado(id); g.fBusca = texto; render(document.activeElement && document.activeElement.tagName==="INPUT");
}
function filtroTodos(id){
  const g = gridEstado(id);
  const c = window["__cols_"+id].find(x=>x.key===g.filtroCol);
  const distintos = valoresDistintos(c, window["__rows_"+id]);
  const q = (g.fBusca||"").toLowerCase();
  const visiveis = distintos.filter(v=>v.toLowerCase().includes(q));
  if(!(g.fTemp instanceof Set)) g.fTemp = new Set(distintos);
  const todos = visiveis.every(v=>g.fTemp.has(v));
  visiveis.forEach(v=> todos ? g.fTemp.delete(v) : g.fTemp.add(v));
  render();
}
function aplicarFiltro(id){
  const g = gridEstado(id);
  const c = window["__cols_"+id].find(x=>x.key===g.filtroCol);
  const distintos = valoresDistintos(c, window["__rows_"+id]);
  const sel = (g.fTemp instanceof Set) ? [...g.fTemp] : distintos.slice();
  if(sel.length === distintos.length) delete g.filtros[g.filtroCol]; // tudo marcado = sem filtro
  else if(sel.length === 0){ toast("Selecione ao menos um valor."); return; }
  else g.filtros[g.filtroCol] = sel;
  // período
  const per = g.perTemp || {};
  if(per.de || per.ate) g.periodos[g.filtroCol] = {de:per.de||"", ate:per.ate||""};
  else delete g.periodos[g.filtroCol];
  g.filtroCol = null; g.fTemp = null; g.perTemp = null; g.fBusca = "";
  render();
}
function limparFiltroCol(id, key){
  const g = gridEstado(id); delete g.filtros[key]; delete g.periodos[key]; g.filtroCol = null; g.fTemp = null; g.perTemp = null; render();
}
function fecharFiltro(id){
  const g = gridEstado(id); g.filtroCol = null; g.fTemp = null; g.perTemp = null; g.fBusca = ""; render();
}
function periodoTemp(id, campo, valor){
  const g = gridEstado(id); if(!g.perTemp) g.perTemp = {de:"",ate:""}; g.perTemp[campo] = valor; render();
}
function limparPeriodoTemp(id){
  const g = gridEstado(id); g.perTemp = {de:"",ate:""}; render();
}

/* ---- seleção de linhas ---- */
function selecionarLinha(ev, id, nf){
  const g = gridEstado(id);
  const ordem = window["__ordem_"+id] || [];
  if(ev.shiftKey && g.selAnchor){
    const a = ordem.indexOf(g.selAnchor), b = ordem.indexOf(nf);
    if(a>-1 && b>-1){ const [ini,fim]=[Math.min(a,b),Math.max(a,b)]; g.sel = new Set(); for(let i=ini;i<=fim;i++) g.sel.add(ordem[i]); }
  } else if(ev.ctrlKey || ev.metaKey){
    if(g.sel.has(nf)) g.sel.delete(nf); else g.sel.add(nf);
    g.selAnchor = nf;
  } else {
    g.sel = new Set([nf]); g.selAnchor = nf;
  }
  render();
}
function limparSelecao(id){ const g = gridEstado(id); g.sel = new Set(); g.selAnchor = null; render(); }

/* ---- rastreamento SSW ---- */
function rastrearSSW(id){
  const g = gridEstado(id);
  const nfs = [...g.sel];
  if(!nfs.length){ toast("Selecione ao menos uma nota para rastrear no SSW."); return; }
  toast("Abrindo rastreamento SSW para "+nfs.length+" nota(s): "+nfs.join(", "));
  try { window.open("https://ssw.inf.br/2/rastreamento", "_blank", "noopener"); } catch(e){}
}

function ordenarGrid(id, key){
  const g = gridEstado(id);
  g.sort = (g.sort && g.sort.key===key && g.sort.dir==="asc") ? {key, dir:"desc"} : {key, dir:"asc"};
  render();
}
function buscarGrid(id, v){
  const g = gridEstado(id); g.busca = v;
  render(document.activeElement && document.activeElement.tagName==="INPUT");
}
function alternarColuna(id, key){
  const g = gridEstado(id);
  g.ocultas = g.ocultas.includes(key) ? g.ocultas.filter(k=>k!==key) : g.ocultas.concat(key);

}

function blocoResumo(){
  const k = kpis();
  const rf = estado.rf || (estado.rf = {cat:"Todos", transp:"Todos", uf:"Todos"});
  let f = notasFiltradas();

  const CATS = [
    {k:"mon_Transportadora", l:"Mon. Transp."},
    {k:"mon_Redespacho", l:"Mon. Redesp."},
    {k:"agend_Transportadora", l:"Agend. Transp."},
    {k:"agend_Redespacho", l:"Agend. Redesp."},
    {k:"__retencao", l:"Retenção"},
    {k:"esp_Redespacho", l:"Esp. Redesp."},
    {k:"esp_Transportadora", l:"Esp. Transp."},
  ];
  // aplica os filtros do resumo (selecionados nos dropdowns)
  const fSel = f.filter(n =>
    (rf.cat==="Todos" || (rf.cat==="__retencao" ? n.ehRetida : n.cat===rf.cat)) &&
    (rf.transp==="Todos" || n.transp===rf.transp) &&
    (rf.uf==="Todos" || n.uf===rf.uf));
  const filtrando = rf.cat!=="Todos" || rf.transp!=="Todos" || rf.uf!=="Todos";
  const base = filtrando ? fSel : f;

  const totalNF = base.length || 1;
  const rowsCat = CATS.map(c=>{
    const n = c.k==="__retencao" ? base.filter(x=>x.ehRetida).length : base.filter(x=>x.cat===c.k).length;
    return '<tr><td>'+esc(c.l)+'</td><td class="num">'+n+'</td><td class="num">'+((n/totalNF)*100).toFixed(1)+'%</td></tr>';
  }).join("");

  const porTransp = {}; base.forEach(n=>{ porTransp[n.transp||"(sem)"]=(porTransp[n.transp||"(sem)"]||0)+1; });
  const listaTransp = Object.entries(porTransp).sort((a,b)=>b[1]-a[1]);

    const max = Math.max.apply(null, dim.map(d=>d[1]).concat([1]));

      + '<span class="ig-val">'+qtd+'</span></div>').join("");
    grafico = '<div class="painel-info azul" style="margin-bottom:16px">'
      + '<div class="pi-tit"><span class="pi-dot azul"></span>Infográfico — '+esc(titulo)+' ('+base.length+' notas no filtro)</div>'
      + '<div class="ig">'+barras+'</div></div>';
  }

  return `
    <div class="cards">
      ${cardHTML("Total de Notas",k.total,null,null)}
      ${cardHTML("Retidas",k.retidas,"var(--vermelho)")}
      ${cardHTML("Sem Previsão",k.semPrev,"var(--laranja)")}

      <label>UF <select class="input" onchange="resumoFiltro('uf',this.value)">${opts(ufs, rf.uf)}</select></label>
      ${filtrando?'<button class="btn pequeno" onclick="limparResumoFiltros()">Limpar filtros</button>':""}
    </div>
    ${grafico}
    <div class="resumo-grid">
      <div class="painel-info azul">
        <div class="pi-tit"><span class="pi-dot azul"></span>Totais por categoria de monitoramento</div>

          <tbody>${rowsCat}
            <tr class="total"><td>Total de NFs</td><td class="num">${base.length}</td><td class="num">100%</td></tr>
          </tbody>
        </table>

function aprovarUsuario(i){
  const u = USUARIOS[i];
  u.status = "aprovado";
  if(!ehAdmin(u) && (!Array.isArray(u.paginas) || !u.paginas.length)){
    const padrao = ACESSO_PADRAO[u.perfil];
    u.paginas = padrao === "ALL" ? "ALL" : (padrao ? padrao.slice() : ["operacional"]);
  }
  salvarUsuarios(); toast("Acesso liberado para "+u.nome); render();
}
function recusarUsuario(i){ USUARIOS[i].status="recusado"; salvarUsuarios(); render(); }
function bloquearUsuario(i){ USUARIOS[i].status="recusado"; salvarUsuarios(); toast("Acesso revogado."); render(); }
function mudarPerfil(i,v){ USUARIOS[i].perfil=v; salvarUsuarios(); render(); }
function alternarAcesso(i,chave){
  const u = USUARIOS[i];
  if(!Array.isArray(u.paginas)) u.paginas = [];
  u.paginas = u.paginas.includes(chave) ? u.paginas.filter(k=>k!==chave) : u.paginas.concat(chave);
  salvarUsuarios(); render();
}

/* ---------- comprovantes: ações ---------- */
function mudarAbaComp(a){ estado.abaComp = a; estado.historicoDe = null; render(); }
function filtrarComp(nf, st){
  if(nf!==null) estado.fCompNF = nf;
  if(st!==null) estado.fCompStatus = st;
  render(document.activeElement && document.activeElement.id==="fCompNF");
}
function alternarHistorico(p){ estado.historicoDe = estado.historicoDe===p ? null : p; render(); }

function solicitarComprovante(){
  const v = (id)=>($( "#"+id )||{}).value || "";
  const nf = v("cNF"), solic = v("cSolic"), email = v("cEmail");
  if(!nf){ toast("Informe a Nota Fiscal."); return; }
  if(!solic){ toast("Informe o solicitante."); return; }
  if(!emailValido(email)){ toast("Informe um e-mail de solicitante válido."); return; }
  const protocolo = "SC-2026-"+String(estado.solicitacoes.length+1).padStart(4,"0");
  const agora = new Date();
  const emissao = v("cEmissao") ? v("cEmissao").split("-").reverse().join("/") : "";
  estado.solicitacoes.unshift({
    protocolo, estab:v("cEstab"), nf, emissao, transp:v("cTransp"), solicitante:solic, email, motivo:v("cMotivo"), obs:v("cObs"),
    status:"Pendente", data:fmt(agora), arquivo:null,
    historico:[{acao:"Criação da solicitação", usuario:solic||"operador", quando:fmt(agora)+" "+agora.toLocaleTimeString("pt-BR")}],
  });
  notificar("Solicitação "+protocolo+" criada");
  estado.abaComp = "consultar";
  render();
}

function anexarPara(protocolo){
  estado.alvoUpload = protocolo;
  $("#inputArquivo").click();
}
$("#inputArquivo").addEventListener("change", function(e){
  const f = e.target.files && e.target.files[0];
  if(!f || !estado.alvoUpload) return;
  if(!/\.(pdf|jpg|jpeg|png|docx|xlsx)$/i.test(f.name)){ toast("Formato não permitido. Use PDF, JPG, PNG, DOCX ou XLSX."); e.target.value=""; return; }
  const agora = new Date(), hora = fmt(agora)+" "+agora.toLocaleTimeString("pt-BR");
  if(estado.alvoUpload === "__avulso__"){
    toast("Arquivo \""+f.name+"\" recebido com sucesso.");
    e.target.value = ""; estado.alvoUpload = null; return;
  }
  const s = estado.solicitacoes.find(x=>x.protocolo===estado.alvoUpload);
  if(s){
    s.arquivo = f.name; s.status = "Concluído";
    s.historico.push({acao:"Upload do comprovante ("+f.name+")", usuario:"operador", quando:hora});
    s.historico.push({acao:"Conclusão da solicitação", usuario:"sistema", quando:hora});
    notificar("Comprovante recebido — "+s.protocolo);
  }
  e.target.value = ""; estado.alvoUpload = null;
  render();
});


/* ---------- pesquisa global (visão 360) ---------- */
function abrir360(nf){
  nf = String(nf).trim();
  const n = NOTAS.find(x=>x.nf===nf);
  const comps = estado.solicitacoes.filter(s=>s.nf===nf);
  const linha = (r,v)=>'<div class="linha360"><span class="r">'+r+'</span><span style="flex:1">'+v+'</span></div>';
  let corpo;
  if(!n){
    corpo = '<div class="vazio" style="font-size:13px">Nenhuma nota encontrada com esse número. Verifique e pesquise novamente.</div>';
  } else {
    corpo =
      linha("Estab.", esc(n.estab)) +
      linha("Cliente", esc(n.cliente)) +
      linha("Transportadora", esc(n.transp)) +
      linha("Nº do Embarque", esc(n.embarque||"—")) +
      linha("Romaneio", esc(n.romaneio||"—")) +
      linha("Emissão", esc(n.emissao||"—")) +
      linha("Saída", esc(n.saida||"—")) +
      linha("Valor da Nota", brl(n.valor||0)) +
      linha("Tem M3000", n.temM3000 ? '<span class="badge b-vermelho">SIM</span>' : '<span class="badge b-verde">NÃO</span>') +
      linha("Retenção", n.ehRetida ? '<span class="badge b-vermelho">Em retenção (Cod '+esc(n.cod)+')</span>' : '<span class="badge b-verde">Não retida</span>') +
      linha("Comprovantes", comps.length ? esc(comps.map(c=>c.protocolo+" ("+c.status+")").join(", ")) : "Nenhuma solicitação") +
      (n.entregue ? linha("Entregue", esc(n.entregue)) : "") +
      (n.obs ? linha("Observação", esc(n.obs)) : "");
  }
  const m = $("#modal360");
  m.innerHTML = `
    <div class="modal-caixa" onclick="event.stopPropagation()">
      <div class="topo">Pesquisa global — NF ${esc(nf)}
        <div style="flex:1"></div>
        <button class="icone-btn" onclick="fechar360()">✕</button>
      </div>${corpo}
    </div>`;
  m.classList.remove("hidden");
}
function fechar360(){ $("#modal360").classList.add("hidden"); }
$("#modal360").addEventListener("click", fechar360);

/* ---------- presença (quem está online) ---------- */
// cada sessão logada registra um "batimento" a cada 20s; quem bateu nos últimos 2 min conta como online
let timerOnline = null;
function baterPresenca(){
  if(!estado.usuario) return;
  const mapa = store.read("pl_online", {}) || {};
  mapa[estado.usuario.email] = { nome: estado.usuario.nome, ts: Date.now() };
  store.write("pl_online", mapa);
  atualizarOnline();
}
function usuariosOnline(){
  const mapa = store.read("pl_online", {}) || {};
  const limite = Date.now() - 2*60*1000;
  return Object.entries(mapa)
    .filter(([,v]) => v && v.ts > limite)
    .map(([email,v]) => ({email, nome:v.nome, ts:v.ts}))
    .sort((a,b) => a.nome.localeCompare(b.nome,"pt-BR"));
}
function atualizarOnline(){
  const on = usuariosOnline();
  const qtd = $("#onlineQtd"); if(qtd) qtd.textContent = on.length;
  const lista = $("#listaOnline");
  if(lista) lista.innerHTML = on.length ? on.map(u=>{
    const min = Math.round((Date.now()-u.ts)/60000);
    return '<div class="online-item"><span class="online-dot"></span><span>'+esc(u.nome)+(u.email===(estado.usuario&&estado.usuario.email)?' <span style="color:var(--sub)">(você)</span>':'')+'</span><span class="quando">'+(min<1?'agora':'há '+min+' min')+'</span></div>';
  }).join("") : '<div class="online-item"><span class="vazio">Ninguém online.</span></div>';
}
function iniciarPresenca(){
  baterPresenca();
  if(timerOnline) clearInterval(timerOnline);
  timerOnline = setInterval(baterPresenca, 20000);
}
function encerrarPresenca(){
  if(timerOnline){ clearInterval(timerOnline); timerOnline = null; }
  if(estado.usuario){
    const mapa = store.read("pl_online", {}) || {};
    delete mapa[estado.usuario.email];
    store.write("pl_online", mapa);
  }
}

/* ---------- notificações e toasts ---------- */
function notificar(txt){ estado.notifs.unshift({txt, quando:"agora"}); estado.notifsNaoLidas++; atualizarNotifs(); toast(txt); }
function atualizarNotifs(){
  const badge = $("#notifQtd");
  if(estado.notifsNaoLidas > 0){ badge.textContent = estado.notifsNaoLidas; badge.style.display = ""; }
  else { badge.style.display = "none"; }
  $("#listaNotif").innerHTML = estado.notifs.length
    ? estado.notifs.map(n=>'<div class="notif-item">'+esc(n.txt)+'<div class="quando">'+esc(n.quando)+'</div></div>').join("")
    : '<div class="notif-item"><span class="vazio">Nenhuma notificação.</span></div>';
}
function marcarNotifsLidas(){ estado.notifsNaoLidas = 0; atualizarNotifs(); }
function limparNotifs(){ estado.notifs = []; estado.notifsNaoLidas = 0; atualizarNotifs(); }
function toast(txt){
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = txt;
  $("#toasts").appendChild(el);
  setTimeout(()=>el.remove(), 4200);
}

/* ---------- navegação (barra superior única) ---------- */
// primeira aba que o usuário pode acessar
function primeiraTabPermitida(){
  const cand = ["resumo","comprovantes","usuarios","config"];
  for(const k of cand){ if(tabPermitida(estado.usuario, k)) return k; }
  return "resumo";
}
function mudarTabOp(k){
  if(!tabPermitida(estado.usuario, k)){ toast("Você não tem acesso a esta página."); return; }
  estado.tabOp = k; estado.filtroCard = null; estado.historicoDe = null;
  document.querySelectorAll(".nav-drop.aberto").forEach(el=>el.classList.remove("aberto"));
  render();
}
// compatibilidade: navegar(nomeModulo) redireciona para a aba correspondente
function navegar(p){ mudarTabOp(p); }

/* ---------- render principal ---------- */
function render(preservarFoco){
  const foco = preservarFoco && document.activeElement ? document.activeElement : null;
  const focoId = foco ? foco.id : null;
  const focoPos = foco && foco.selectionStart != null ? foco.selectionStart : null;
  const focoValor = foco ? foco.value : null;

  // garante que a aba atual é acessível; senão vai para a primeira disponível
  if(!tabPermitida(estado.usuario, estado.tabOp || "resumo")){
    estado.tabOp = primeiraTabPermitida();
  }

  $("#conteudo").innerHTML = paginaOperacional();

  // devolve o foco ao campo de busca após re-render (grids re-renderizam a cada tecla)
  if(focoId){
    const novo = document.getElementById(focoId) || document.querySelector('input[placeholder="Pesquisar na tabela…"]');
    if(novo){ novo.focus(); if(focoPos!=null && novo.value===focoValor) try{ novo.setSelectionRange(focoPos, focoPos); }catch(e){} else { const fim=novo.value.length; try{ novo.setSelectionRange(fim, fim); }catch(e){} } }
  }
}

/* ---------- autenticação ---------- */
function trocarAuth(aba){
  estado.authAba = aba;
  $("#formEntrar").classList.toggle("hidden", aba!=="entrar");
  $("#formRegistrar").classList.toggle("hidden", aba!=="registrar");
  $("#tabEntrar").classList.toggle("ativa", aba==="entrar");
  $("#tabRegistrar").classList.toggle("ativa", aba==="registrar");
}
const emailValido = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

$("#btnEntrar").addEventListener("click", entrar);
$("#loginSenha").addEventListener("keydown", e => { if(e.key==="Enter") entrar(); });
$("#btnRegistrar").addEventListener("click", registrar);
$("#regSenha2").addEventListener("keydown", e => { if(e.key==="Enter") registrar(); });

function entrar(){
  const email = $("#loginEmail").value.trim();
  const senha = $("#loginSenha").value;
  if(!emailValido(email)){ toast("Informe um e-mail válido."); return; }
  const u = acharUsuario(email);
  if(!u || u.senha !== senha){ toast("E-mail ou senha incorretos."); return; }
  if(u.status === "pendente"){ toast("Seu cadastro ainda aguarda liberação do administrador."); return; }
  if(u.status === "recusado"){ toast("Seu acesso não está autorizado. Fale com o administrador."); return; }

  estado.usuario = u;
  estado.tabOp = tabPermitida(u, "resumo") ? "resumo" : primeiraTabPermitida();
  if(!estado.atualizacao) estado.atualizacao = { data: fmt(HOJE), hora: "08:00", por: "sistema" };
  $("#userNome").textContent = u.nome;
  $("#userEmail").textContent = u.email;
  $("#userPerfil").textContent = "Perfil: "+u.perfil;
  $("#telaLogin").classList.add("hidden");
  $("#app").classList.remove("hidden");
  popularFiltrosHeader();
  atualizarInfoBarra();
  // retornos enviados pelas transportadoras desde o último acesso
  const rets = store.read("pl_retornos", []) || [];
  if(rets.length){
    carregarNotas(); // reaplica edições recebidas
    rets.forEach(r => estado.notifs.unshift({txt:"Retorno recebido — "+r.transp+" ("+r.qtd+" nota(s))", quando:r.quando}));
    estado.notifsNaoLidas += rets.length;
    store.write("pl_retornos", []);
  }
  atualizarNotifs();
  iniciarPresenca();
  render();
  toast("Bem-vindo ao Portal Logístico, "+u.nome.split(" ")[0]+"!");
}

function registrar(){
  const nome = $("#regNome").value.trim();
  const email = $("#regEmail").value.trim();
  const senha = $("#regSenha").value;
  const senha2 = $("#regSenha2").value;
  if(!nome){ toast("Informe seu nome."); return; }
  if(!emailValido(email)){ toast("Informe um e-mail válido."); return; }
  if(acharUsuario(email)){ toast("Já existe um cadastro com esse e-mail."); return; }
  if(senha.length < 6){ toast("A senha deve ter ao menos 6 caracteres."); return; }
  if(senha !== senha2){ toast("As senhas não conferem."); return; }

  USUARIOS.push({
    nome, email, senha, perfil:"Consulta", status:"pendente", paginas:[], criadoEm:fmt(new Date()),
  });
  salvarUsuarios();
  ["regNome","regEmail","regSenha","regSenha2"].forEach(id=>$("#"+id).value="");
  trocarAuth("entrar");
  toast("Cadastro enviado! Aguarde a liberação do administrador para acessar.");
}

function sair(){
  encerrarPresenca();
  estado.usuario = null;
  estado.tabOp = "resumo";
  $("#menuUser").classList.add("hidden");
  $("#app").classList.add("hidden");
  $("#telaLogin").classList.remove("hidden");
  $("#loginSenha").value = "";
  trocarAuth("entrar");
}

/* ---------- atualização / importação de planilha ---------- */
function atualizarInfoBarra(){
  const a = estado.atualizacao;
  const info = $("#atualizadoInfo");
  if(!info) return;
  if(!a){ info.innerHTML = ""; return; }
  info.innerHTML = 'Atualizado em: <b>'+esc(a.data)+'</b> · '
    + '<span class="pub">Última publicação: '+esc(a.data)+', '+esc(a.hora)+' por '+esc(a.por)+'</span>';
  atualizarBtnDisparo();
}
function atualizarBtnDisparo(){
  const btn = $("#btnDisparo"); if(!btn) return;
  if(!podeEditar(estado.usuario)){ btn.style.display = "none"; return; }
  btn.style.display = "";
  const disp = store.read("pl_disparo", null);
  if(disp){
    btn.disabled = true;
    btn.style.opacity = ".55"; btn.style.cursor = "default";
    btn.innerHTML = "✓ Disparado em "+esc(disp.data)+" "+esc(disp.hora);
    btn.title = "Já disparado por "+disp.por+". Um novo disparo será liberado após importar nova planilha.";
  } else {
    btn.disabled = false;
    btn.style.opacity = ""; btn.style.cursor = "pointer";
    btn.innerHTML = "✉ Disparar e-mails";
    btn.title = "Envia a cada transportadora um link para informar entrega/observação das notas pendentes";
  }
}

/* ---------- disparo de e-mails às transportadoras ---------- */
function pendentesPorTransportadora(){
  const mapa = {};
  NOTAS.filter(n => !transpOculta(n.transp) && !n.foiEntregue && n.transp).forEach(n=>{
    (mapa[n.transp] = mapa[n.transp] || []).push(n);
  });
  return mapa;
}
function linkRetorno(nome){
  const base = location.href.split("#")[0];
  return base + "#retorno=" + encodeURIComponent(nome);
}
function dispararEmails(){
  if(!podeEditar(estado.usuario)){ toast("Seu perfil não tem permissão para disparar e-mails."); return; }
  if(store.read("pl_disparo", null)){ toast("Os e-mails desta publicação já foram disparados. Importe uma nova planilha para liberar novo disparo."); return; }
  const mapa = pendentesPorTransportadora();
  const comEmail = Object.keys(mapa).filter(t => EMAILS_TRANSP[t]);
  if(!comEmail.length){ toast("Nenhuma transportadora com notas pendentes tem e-mail cadastrado. Cadastre em Configurações."); return; }
  const semEmail = Object.keys(mapa).filter(t => !EMAILS_TRANSP[t]);
  if(!confirm("Disparar e-mails para "+comEmail.length+" transportadora(s)?\n\nEsta ação só poderá ser repetida após importar uma nova planilha.")) return;

  const agora = new Date();
  const disp = { data: fmt(agora), hora: agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}), por: estado.usuario.email };
  store.write("pl_disparo", disp);
  atualizarBtnDisparo();
  notificar("E-mails disparados para "+comEmail.length+" transportadora(s)");

  // painel com as mensagens preparadas (sem servidor de e-mail, abrimos via mailto)
  const linhas = comEmail.map(t=>{
    const qtd = mapa[t].length;
    const link = linkRetorno(t);
    const assunto = encodeURIComponent("Portal Logístico — retorno de "+qtd+" nota(s) pendente(s)");
    const corpoMail = encodeURIComponent("Olá, "+t+"!\n\nVocê tem "+qtd+" nota(s) pendente(s) de retorno.\nAcesse o link abaixo, informe a data de entrega e a observação de cada nota e clique em Enviar:\n\n"+link+"\n\nObrigado!");
    return '<tr><td>'+esc(t)+'</td><td style="color:var(--accent)">'+esc(EMAILS_TRANSP[t])+'</td><td class="num">'+qtd+'</td>'
      + '<td><input class="input" style="width:100%;font-size:11px" readonly value="'+esc(link)+'" onclick="this.select()"></td>'
      + '<td><a class="btn pequeno" href="mailto:'+esc(EMAILS_TRANSP[t])+'?subject='+assunto+'&body='+corpoMail+'">Abrir e-mail</a></td></tr>';
  }).join("");
  const aviso = semEmail.length ? '<p class="sub-texto" style="margin-top:10px">Sem e-mail cadastrado (não incluídas): '+semEmail.map(esc).join(", ")+'.</p>' : "";
  const m = $("#modal360");
  m.innerHTML = `
    <div class="modal-caixa" style="width:min(780px,94vw)" onclick="event.stopPropagation()">
      <div class="topo">E-mails disparados — ${comEmail.length} transportadora(s)
        <div style="flex:1"></div>
        <button class="icone-btn" onclick="fechar360()">✕</button>
      </div>
      <p class="sub-texto" style="margin:0 0 10px">Cada transportadora recebe o próprio link. Clique em "Abrir e-mail" para enviar pelo seu programa de e-mail, ou copie o link.</p>
      <div class="tabela-wrap" style="max-height:320px">
        <table><thead><tr><th>Transportadora</th><th>E-mail</th><th class="num">Notas</th><th>Link de retorno</th><th></th></tr></thead>
        <tbody>${linhas}</tbody></table>
      </div>${aviso}
    </div>`;
  m.classList.remove("hidden");
}
$("#inputImport").addEventListener("change", (e)=>{
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  if(!/\.(xlsx|xls|csv)$/i.test(f.name)){ toast("Envie uma planilha .xlsx, .xls ou .csv."); e.target.value=""; return; }
  if(typeof XLSX === "undefined"){
    registrarPublicacao(f.name, 0); e.target.value=""; return;
  }
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(new Uint8Array(ev.target.result), {type:"array", cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const linhas = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
      if(!linhas.length){ toast("Planilha vazia."); return; }
      const dados = [];
      for(let i=1;i<linhas.length;i++){
        const r = linhas[i];
        if(!r || r.every(v=>v===null||v==="")) continue;
        const o = {};
        CHAVES_PLANILHA.forEach((k,j)=>{
          let v = r[j];
          if(v instanceof Date){ v = ("0"+v.getDate()).slice(-2)+"/"+("0"+(v.getMonth()+1)).slice(-2)+"/"+v.getFullYear(); }
          o[k] = (k==="valor") ? (parseFloat(v)||0) : (v===null||v===undefined ? "" : String(v));
        });
        dados.push(o);
      }
      if(!dados.length){ toast("Nenhuma linha de dados encontrada na planilha."); return; }
      store.write("pl_dados", dados);
      carregarNotas();
      estado.grids = {};           // limpa filtros/seleções das grids
      popularFiltrosHeader();
      registrarPublicacao(f.name, dados.length);
    }catch(err){
      console.error(err);
      toast("Não foi possível ler a planilha. Verifique o arquivo.");
    }
  };
  reader.readAsArrayBuffer(f);
  e.target.value = "";
});
function registrarPublicacao(nomeArq, qtd){
  store.write("pl_disparo", null);   // nova planilha libera novo disparo
  const agora = new Date();
  estado.atualizacao = {
    data: fmt(agora),
    hora: agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    por: (estado.usuario && estado.usuario.email) || "—",
  };
  atualizarInfoBarra();
  notificar('Planilha "'+nomeArq+'" importada'+(qtd?' — '+qtd+' notas publicadas':' e publicada'));
  render();
}

    </div>`
    : '<div class="painel" style="max-width:520px"><span class="vazio">Nenhuma nota pendente para esta transportadora. Obrigado!</span></div>';
  document.body.innerHTML = `
    <div style="max-width:960px;margin:40px auto;padding:0 20px;font-family:'Segoe UI',system-ui,sans-serif">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">

        <h1 style="font-size:20px;margin:0">Portal Logístico — Retorno de entregas</h1>

      <div id="retornoCorpo">${corpo}</div>

    <div id="toasts"></div>`;
}
function enviarRetorno(nome){
  const inputs = [...document.querySelectorAll("input[data-nf]")];
  let alteradas = 0; const porNota = {};
  inputs.forEach(inp=>{
    const v = inp.value.trim(); if(!v) return;
    const nf = inp.getAttribute("data-nf"), campo = inp.getAttribute("data-campo");
    porNota[nf] = porNota[nf] || {};
    porNota[nf][campo] = campo==="entregue" ? v.split("-").reverse().join("/") : v;
  });
  Object.entries(porNota).forEach(([nf,campos])=>{
    Object.entries(campos).forEach(([campo,valor])=> salvarEdicao(nf, campo, valor));
    alteradas++;
  });
  if(!alteradas){ toast("Preencha ao menos uma nota antes de enviar."); return; }
  // registra o retorno para notificar o portal na próxima abertura
  const rets = store.read("pl_retornos", []) || [];
  rets.push({transp:nome, qtd:alteradas, quando:fmt(new Date())+" "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})});
  store.write("pl_retornos", rets);
  document.getElementById("retornoCorpo").innerHTML =
    '<div class="painel" style="max-width:560px;text-align:center;padding:34px">'
    + '<div style="font-size:40px;line-height:1">✅</div>'
    + '<div style="font-weight:700;font-size:16px;margin-top:10px">Retorno enviado!</div>'
    + '<p class="sub-texto" style="margin-top:6px">'+alteradas+' nota(s) atualizada(s). As colunas Entregue e Observação do portal já foram preenchidas. Você pode fechar esta página.</p></div>';
}
// se a página foi aberta pelo link do e-mail (#retorno=NOME), mostra o formulário da transportadora
(function(){
  const m = /#retorno=(.+)$/.exec(location.hash||"");
  if(m){ abrirPaginaRetorno(decodeURIComponent(m[1])); }
})();

/* simula notificação em tempo real */
setTimeout(() => notificar("Solicitação vencida — verificar comprovantes pendentes"), 25000);
</script>
